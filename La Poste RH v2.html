<!DOCTYPE html><html lang="fr"><head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Poste — Gestion RH</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Space+Mono&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07071a;
  --g1:rgba(255,255,255,0.09);
  --g2:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.14);
  --border2:rgba(255,255,255,0.07);
  --yellow:#FFD100;
  --neon:#38bdf8;
  --purple:#a78bfa;
  --text:#f0f0ff;
  --text2:#9494b8;
  --text3:#4a4a6a;
  --r:18px;
  --blur:blur(40px) saturate(180%);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

/* Ambient background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 10% 15%, rgba(255,180,0,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 80%, rgba(56,189,248,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(167,139,250,0.06) 0%, transparent 60%);
}

#root{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}

/* ─── Glass mixin ─── */
.glass{
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.18),inset 0 -1px 0 rgba(0,0,0,0.12);
}

/* ─── Layout shell ─── */
.shell{flex:1;display:flex;overflow:hidden;}

/* ─── Sidebar ─── */
.sidebar{
  width:220px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.04) 100%);
  backdrop-filter:var(--blur);
  border-right:1px solid var(--border2);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-logo{
  padding:20px 16px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border2);
}
.logo-mark{
  width:34px;height:34px;border-radius:10px;
  background:var(--yellow);display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono';font-weight:700;font-size:12px;color:#000;flex-shrink:0;
}
.logo-text{font-size:13px;font-weight:700;line-height:1.2;}
.logo-sub{font-size:10px;color:var(--text2);margin-top:1px;}

/* Teams section */
.sidebar-section{padding:12px 10px 6px;}
.sidebar-section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:0 6px;margin-bottom:6px;}
.team-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:11px;
  cursor:pointer;transition:all .18s;font-size:13px;font-weight:500;
}
.team-item:hover{background:rgba(255,255,255,0.07);}
.team-item.active{background:rgba(255,209,0,0.12);border:1px solid rgba(255,209,0,0.25);}
.team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.team-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-count{font-size:10px;color:var(--text2);font-family:'Space Mono';}
.add-team-btn{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:11px;
  cursor:pointer;font-size:12px;color:var(--text2);transition:.18s;
}
.add-team-btn:hover{color:var(--yellow);background:rgba(255,209,0,0.08);}

/* Sidebar nav */
.sidebar-nav{padding:8px 10px;border-top:1px solid var(--border2);}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:11px;
  cursor:pointer;transition:all .18s;font-size:13px;font-weight:500;color:var(--text2);
}
.nav-item:hover{background:rgba(255,255,255,0.07);color:var(--text);}
.nav-item.active{background:rgba(255,255,255,0.09);color:var(--text);}
.nav-icon{font-size:16px;width:20px;text-align:center;}

/* Sidebar bottom */
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border2);}
.import-btn{
  width:100%;padding:9px;border-radius:12px;border:1px dashed rgba(56,189,248,0.35);
  background:rgba(56,189,248,0.06);color:var(--neon);font-family:inherit;
  font-size:12px;font-weight:600;cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.import-btn:hover{background:rgba(56,189,248,0.12);border-color:rgba(56,189,248,0.55);}

/* ─── Header bar ─── */
.topbar{
  padding:10px 20px;
  background:rgba(7,7,26,0.75);
  backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--text2);}
.month-nav{display:flex;align-items:center;gap:8px;margin-left:auto;}
.mnbtn{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);
  background:rgba(255,255,255,0.05);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s;
}
.mnbtn:hover{background:rgba(255,255,255,0.12);border-color:var(--border);}
.month-lbl{font-size:13px;font-weight:600;min-width:120px;text-align:center;}
.tbtn{
  padding:6px 14px;border-radius:10px;border:none;font-family:inherit;font-size:12px;
  font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s;
}
.tbtn-y{background:var(--yellow);color:#000;}
.tbtn-y:hover{background:#e6bc00;transform:translateY(-1px);}
.tbtn-g{background:rgba(255,255,255,0.07);border:1px solid var(--border2);color:var(--text);}
.tbtn-g:hover{background:rgba(255,255,255,0.12);}
.tbtn-n{background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);color:var(--neon);}
.tbtn-n:hover{background:rgba(56,189,248,0.2);}
.tbtn-d{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171;}
.tbtn-d:hover{background:rgba(239,68,68,0.2);}

/* ─── Main area ─── */
.main{flex:1;display:flex;overflow:hidden;}

/* ─── Calendar panel ─── */
.cal-panel{flex:1;display:flex;flex-direction:column;padding:14px 0 14px 14px;overflow:hidden;}
.panel-card{
  border-radius:var(--r);overflow:hidden;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  display:flex;flex-direction:column;flex:1;
}
.panel-hdr{
  padding:10px 14px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:rgba(255,255,255,0.03);
}
.phdr-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;}
.panel-scroll{flex:1;overflow:auto;}

/* Calendar grid */
.cal-grid{
  display:grid;
  grid-template-columns:150px repeat(var(--days,31),minmax(26px,1fr));
  min-width:max-content;
}
.ch-agent{
  padding:6px 10px;font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;background:#0a0a1e;z-index:3;text-align:left;
}
.ch-day{
  padding:4px 2px;text-align:center;
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;background:#0a0a1e;z-index:3;
  font-size:9px;font-weight:600;color:var(--text3);
}
.ch-day.today{color:var(--yellow);}
.ch-day.we{color:var(--text3);opacity:.5;}
.ca-name{
  padding:5px 10px;font-size:11px;font-weight:500;
  border-bottom:1px solid rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.03);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  position:sticky;left:0;background:#0a0a1e;z-index:2;
}
.ca-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ca-cell{
  border-bottom:1px solid rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.03);
  cursor:pointer;transition:background .1s;position:relative;
  min-height:28px;display:flex;align-items:center;justify-content:center;
}
.ca-cell:hover{background:rgba(255,255,255,0.07);}
.ca-cell.sel{background:rgba(56,189,248,0.1);outline:1px inset rgba(56,189,248,0.35);}
.ca-cell.tod{background:rgba(255,209,0,0.04);}
.ca-cell.we{background:rgba(255,255,255,0.01);}
.abs-lbl{
  width:calc(100% - 3px);height:calc(100% - 3px);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;letter-spacing:.3px;
}

/* Legend */
.cal-legend{
  padding:7px 14px;border-top:1px solid var(--border2);
  display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;
  background:rgba(255,255,255,0.02);
}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.leg-box{width:12px;height:12px;border-radius:3px;}

/* ─── Day panel ─── */
.day-panel{
  width:300px;flex-shrink:0;padding:14px;
  display:flex;flex-direction:column;gap:10px;overflow:hidden;
}
.day-card{
  border-radius:var(--r);
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);
  overflow:hidden;display:flex;flex-direction:column;
}
.day-card-hdr{
  padding:10px 14px;border-bottom:1px solid var(--border2);
  background:rgba(255,255,255,0.03);
}
.day-title{font-size:13px;font-weight:700;}
.day-sub{font-size:10px;color:var(--text2);margin-top:2px;text-transform:capitalize;}
.presence-row{
  padding:10px 14px;display:flex;gap:12px;border-bottom:1px solid var(--border2);
}
.pres-stat{display:flex;align-items:center;gap:5px;font-size:12px;}
.pres-dot{width:6px;height:6px;border-radius:50%;}
.pres-num{font-weight:700;}
.pres-lbl{color:var(--text2);font-size:10px;}
.agent-chips{
  padding:8px 14px 10px;display:flex;flex-wrap:wrap;gap:4px;
  border-bottom:1px solid var(--border2);
}
.achip{
  padding:2px 7px;border-radius:6px;font-size:10px;font-weight:500;
  transition:.15s;cursor:pointer;
}
.achip.abs{opacity:.35;text-decoration:line-through;}

.tlist{flex:1;overflow-y:auto;padding:6px;}
.trow{
  display:flex;align-items:center;gap:7px;padding:6px 8px;
  border-radius:10px;margin-bottom:3px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  transition:background .15s;
}
.trow:hover{background:rgba(255,255,255,0.07);}
.tnum{
  width:28px;height:20px;border-radius:4px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Space Mono';
}
.tname{flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.asel{
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);
  color:var(--text);font-family:inherit;font-size:10px;padding:2px 5px;
  border-radius:6px;cursor:pointer;max-width:90px;
}
.asel:focus{outline:none;}

.day-footer{
  padding:8px 12px;border-top:1px solid var(--border2);flex-shrink:0;
}
.status-pill{
  padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.ok-pill{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#4ade80;}
.warn-pill{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.25);color:#fb923c;}

/* ─── Agents view ─── */
.view-agents{flex:1;overflow-y:auto;padding:16px;}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.agent-card{
  border-radius:16px;padding:14px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  transition:.2s;
}
.agent-card:hover{border-color:var(--border);background:rgba(255,255,255,0.07);}
.ac-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ac-avatar{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#000;flex-shrink:0;
}
.ac-nameInput{
  background:transparent;border:none;color:var(--text);font-family:inherit;
  font-size:14px;font-weight:600;width:100%;
  border-bottom:1px solid transparent;transition:.2s;padding:0;
}
.ac-nameInput:focus{outline:none;border-bottom-color:var(--yellow);}
.ac-role{font-size:10px;color:var(--text2);}
.ac-divider{height:1px;background:var(--border2);margin:8px 0;}
.pref-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pref-lbl{font-size:11px;color:var(--text2);flex:1;}
.toggle{
  width:30px;height:17px;border-radius:9px;cursor:pointer;
  background:rgba(255,255,255,0.1);border:1px solid var(--border2);
  position:relative;transition:.2s;flex-shrink:0;
}
.toggle.on{background:var(--yellow);}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:11px;height:11px;border-radius:50%;background:#000;transition:.2s;
}
.toggle.on::after{left:15px;}
.pref-pills{display:flex;flex-wrap:wrap;gap:3px;max-height:72px;overflow-y:auto;}
.ppill{
  padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);transition:.12s;
  font-family:'Space Mono';
}
.ppill.on{background:var(--neon);color:#000;border-color:var(--neon);}
.ppill:not(.on){background:rgba(255,255,255,0.04);color:var(--text2);}

/* ─── Tournées view ─── */
.view-tournees{flex:1;overflow-y:auto;padding:16px;}
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;}
.t-card{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  transition:.15s;
}
.t-card:hover{background:rgba(255,255,255,0.07);}
.t-badge{
  width:32px;height:32px;border-radius:8px;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Space Mono';color:var(--text);
}
.t-nameInput{
  background:transparent;border:none;color:var(--text);font-family:inherit;
  font-size:12px;font-weight:500;flex:1;min-width:0;
  border-bottom:1px solid transparent;transition:.2s;padding:0;
}
.t-nameInput:focus{outline:none;border-bottom-color:var(--neon);}

/* ─── Stats bar ─── */
.stats-bar{
  display:flex;gap:16px;padding:8px 20px;
  background:rgba(7,7,26,0.8);backdrop-filter:var(--blur);
  border-top:1px solid var(--border2);flex-shrink:0;
  align-items:center;
}
.sstat{display:flex;align-items:center;gap:5px;font-size:11px;}
.sdot{width:6px;height:6px;border-radius:50%;}
.sval{font-weight:700;}
.slbl{color:var(--text2);}
.sbar-right{margin-left:auto;font-size:10px;color:var(--text3);font-family:'Space Mono';}

/* ─── Modals ─── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  animation:fin .15s ease;
}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{
  background:#10102a;border:1px solid var(--border);border-radius:22px;
  padding:24px;min-width:360px;max-width:92vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.8),inset 0 1px rgba(255,255,255,0.1);
  animation:sup .2s ease;
}
@keyframes sup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.field-lbl{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;}
.field-input{
  width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;
  border-radius:11px;margin-bottom:12px;transition:.2s;
}
.field-input:focus{outline:none;border-color:var(--yellow);}

/* Absence type grid */
.abs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.abs-btn{
  padding:9px 6px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.09);
  background:rgba(255,255,255,0.03);cursor:pointer;
  font-family:inherit;font-size:11px;font-weight:600;color:var(--text2);
  transition:.18s;text-align:center;
}
.abs-btn:hover,.abs-btn.sel{border-color:var(--c,#fff);color:var(--c,#fff);background:color-mix(in srgb,var(--c,#fff) 12%,transparent);}
.date-range{display:flex;gap:8px;margin-bottom:14px;}

/* Import panel */
.drop-zone{
  border:2px dashed rgba(56,189,248,0.3);border-radius:14px;
  padding:30px;text-align:center;cursor:pointer;transition:.2s;
  background:rgba(56,189,248,0.04);
}
.drop-zone:hover,.drop-zone.over{border-color:var(--neon);background:rgba(56,189,248,0.08);}
.drop-icon{font-size:32px;margin-bottom:8px;}
.drop-lbl{font-size:14px;font-weight:600;color:var(--text2);}
.drop-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.preview-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px;}
.preview-table th{padding:5px 8px;background:rgba(255,255,255,0.07);font-weight:600;text-align:left;border-radius:4px;}
.preview-table td{padding:4px 8px;border-bottom:1px solid var(--border2);}

/* Color picker row */
.color-row{display:flex;gap:6px;margin-bottom:14px;}
.c-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;transition:.15s;border:2px solid transparent;}
.c-dot.sel{border-color:#fff;transform:scale(1.15);}

input[type=date]{color-scheme:dark;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>

function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}

function mkDefaultTeam(name='Équipe A',color='#FFD100'){
  const agents=Array.from({length:8},(_,i)=>({
    id:mkId(),name:`Agent ${i+1}`,color:AGENT_COLORS[i%AGENT_COLORS.length],prefEnabled:false,preferred:[],
  }));
  const tournees=Array.from({length:20},(_,i)=>({
    id:mkId(),name:`Tournée ${String(i+1).padStart(2,'0')}`,color:T_COLORS[i%T_COLORS.length],num:i+1,
  }));
  return{id:mkId(),name,color,agents,tournees};
}

function autoAssign(team,absMap,dateStr){
  const present=team.agents.filter(a=>!absMap[`${a.id}__${dateStr}`]);
  if(!present.length)return{};
  const res={};let idx=0;
  team.tournees.forEach(t=>{
    const elig=present.filter(a=>{
      if(a.prefEnabled&&a.preferred.length>0)return a.preferred.includes(t.id);
      return true;
    });
    const pool=elig.length?elig:present;
    res[t.id]=pool[idx%pool.length].id;
    idx++;
  });
  return res;
}

// ── AbsenceModal ───────────────────────────────────────────────────────────────
function AbsenceModal({agent,date,existing,onSave,onDelete,onClose}){
  const[type,setType]=useState(existing?.type||'CP');
  const[from,setFrom]=useState(existing?.dateFrom||date);
  const[to,setTo]=useState(existing?.dateTo||date);
  const save=()=>{
    const a=from<=to?from:to, b=from<=to?to:from;
    const dates=[];let cur=parseD(a);const end=parseD(b);
    while(cur<=end){dates.push(fmt(cur));cur.setDate(cur.getDate()+1);}
    onSave(agent.id,dates,type,a,b);
  };
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">Absence · {agent.name}</div>
        <div className="modal-sub">Saisir une absence sur une ou plusieurs dates</div>
        <label className="field-lbl">Période</label>
        <div className="date-range">
          <input type="date" className="field-input" style={{margin:0}} value={from} onChange={e=>setFrom(e.target.value)}/>
          <input type="date" className="field-input" style={{margin:0}} value={to} onChange={e=>setTo(e.target.value)}/>
        </div>
        <label className="field-lbl" style={{marginBottom:8}}>Type d'absence</label>
        <div className="abs-grid">
          {ABSENCE_TYPES.map(t=>(
            <button key={t.code} className={`abs-btn${type===t.code?' sel':''}`}
              style={{'--c':t.color}} onClick={()=>setType(t.code)}>
              <span style={{color:t.color,display:'block',marginBottom:2}}>●</span>{t.label}
            </button>
          ))}
        </div>
        <div className="modal-footer">
          {existing&&<button className="tbtn tbtn-d" onClick={()=>onDelete(agent.id,date)}>Supprimer</button>}
          <button className="tbtn tbtn-g" onClick={onClose}>Annuler</button>
          <button className="tbtn tbtn-y" onClick={save}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

// ── ImportModal ────────────────────────────────────────────────────────────────
function ImportModal({team,onApply,onClose}){
  const[dragging,setDragging]=useState(false);
  const[preview,setPreview]=useState(null);
  const[parsed,setParsed]=useState(null);
  const fileRef=useRef();

  function parseXlsx(ab){
    try{
      const wb=XLSX.read(ab,{type:'array'});
      // Try to find agents and data
      const sheetNames=wb.SheetNames;
      const sheets={};
      sheetNames.forEach(n=>{
        sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:''});
      });
      // Heuristic: find sheet with most data
      let bestSheet=sheetNames[0],bestRows=0;
      sheetNames.forEach(n=>{if(sheets[n].length>bestRows){bestRows=sheets[n].length;bestSheet=n;}});
      const rows=sheets[bestSheet];
      if(!rows.length){setPreview({error:'Fichier vide ou non reconnu'});return;}
      // Detect agents: look for column with text names (first ~50 rows, col 0 or 1)
      const agentCol=0;
      const detectedAgents=[];
      const headerRow=rows[0];
      rows.slice(1).forEach(r=>{
        const v=String(r[agentCol]||'').trim();
        if(v && v.length>2 && v.length<40 && !/^\d/.test(v) && !/date|semaine|tournée/i.test(v)){
          detectedAgents.push(v);
        }
      });
      // Unique agents
      const uniqueAgents=[...new Set(detectedAgents)].slice(0,60);
      // Detect tournees in header row
      const detectedTournees=[];
      headerRow.slice(1).forEach(cell=>{
        const v=String(cell||'').trim();
        if(v && v.length>0 && v.length<30) detectedTournees.push(v);
      });
      const uniqueTournees=[...new Set(detectedTournees)].slice(0,100);
      setParsed({agents:uniqueAgents,tournees:uniqueTournees,sheetName:bestSheet,allSheets:sheetNames,rows:rows.slice(0,5)});
      setPreview({
        agents:uniqueAgents.slice(0,10),
        agentsTotal:uniqueAgents.length,
        tournees:uniqueTournees.slice(0,8),
        tourneesTotal:uniqueTournees.length,
        sheetName:bestSheet,
        rows:rows.slice(0,4),
      });
    }catch(e){setPreview({error:'Erreur de lecture: '+e.message});}
  }

  function handleFile(file){
    const reader=new FileReader();
    reader.onload=e=>parseXlsx(e.target.result);
    reader.readAsArrayBuffer(file);
  }

  function handleDrop(e){
    e.preventDefault();setDragging(false);
    const f=e.dataTransfer.files[0];
    if(f)handleFile(f);
  }

  function applyImport(){
    if(!parsed)return;
    const agents=parsed.agents.map((name,i)=>({
      id:mkId(),name,color:AGENT_COLORS[i%AGENT_COLORS.length],prefEnabled:false,preferred:[],
    }));
    const tournees=parsed.tournees.map((name,i)=>({
      id:mkId(),name,color:T_COLORS[i%T_COLORS.length],num:i+1,
    }));
    onApply({agents,tournees});
  }

  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{minWidth:460}}>
        <div className="modal-title">Importer depuis Excel</div>
        <div className="modal-sub">Glissez un fichier .xlsx — les agents et tournées seront détectés automatiquement</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}}
          onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
        <div className={`drop-zone${dragging?' over':''}`}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={handleDrop}
          onClick={()=>fileRef.current.click()}>
          <div className="drop-icon">📊</div>
          <div className="drop-lbl">Glissez votre fichier Excel ici</div>
          <div className="drop-sub">ou cliquez pour sélectionner · .xlsx .xls .csv</div>
        </div>
        {preview?.error&&<div style={{color:'#f87171',fontSize:12,marginTop:10}}>⚠ {preview.error}</div>}
        {preview&&!preview.error&&(
          <div style={{marginTop:14}}>
            <div style={{display:'flex',gap:16,marginBottom:10}}>
              <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--yellow)'}}>{preview.agentsTotal}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>agents détectés</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{preview.agents.slice(0,3).join(', ')}{preview.agentsTotal>3?'…':''}</div>
              </div>
              <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}}>
                <div style={{fontSize:20,fontWeight:800,color:'var(--neon)'}}>{preview.tourneesTotal}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>tournées détectées</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{preview.tournees.slice(0,3).join(', ')}{preview.tourneesTotal>3?'…':''}</div>
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:5}}>Feuille : <b style={{color:'var(--text)'}}>{preview.sheetName}</b></div>
            <div style={{fontSize:11,color:'#f97316',padding:'6px 10px',borderRadius:8,background:'rgba(249,115,22,0.1)',border:'1px solid rgba(249,115,22,0.2)'}}>
              ⚠ L'import remplacera les agents et tournées de l'équipe actuelle. Les absences et assignations sont conservées.
            </div>
          </div>
        )}
        <div className="modal-footer">
          <button className="tbtn tbtn-g" onClick={onClose}>Annuler</button>
          {parsed&&<button className="tbtn tbtn-y" onClick={applyImport}>Appliquer l'import</button>}
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────────
function App(){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth());
  const[tab,setTab]=useState('planning');
  const[selDay,setSelDay]=useState(fmt(now));
  const[absModal,setAbsModal]=useState(null);
  const[createTeamModal,setCreateTeamModal]=useState(false);
  const[importModal,setImportModal]=useState(false);

  const[teams,setTeams]=useState(()=>{
    try{const d=JSON.parse(localStorage.getItem('lp3_teams'));return d&&d.length?d:[mkDefaultTeam('Équipe A','#FFD100')];}
    catch{return[mkDefaultTeam('Équipe A','#FFD100')];}
  });
  const[curTeamId,setCurTeamId]=useState(()=>{
    try{return localStorage.getItem('lp3_curTeam')||teams[0]?.id;}
    catch{return null;}
  });
  const[absences,setAbsences]=useState(()=>{try{return JSON.parse(localStorage.getItem('lp3_abs'))||{};}catch{return{};}});
  const[assignments,setAssignments]=useState(()=>{try{return JSON.parse(localStorage.getItem('lp3_assign'))||{};}catch{return{};}});

  useEffect(()=>{localStorage.setItem('lp3_teams',JSON.stringify(teams));},[teams]);
  useEffect(()=>{if(curTeamId)localStorage.setItem('lp3_curTeam',curTeamId);},[curTeamId]);
  useEffect(()=>{localStorage.setItem('lp3_abs',JSON.stringify(absences));},[absences]);
  useEffect(()=>{localStorage.setItem('lp3_assign',JSON.stringify(assignments));},[assignments]);

  const team=useMemo(()=>teams.find(t=>t.id===curTeamId)||teams[0],[teams,curTeamId]);

  // Fix curTeamId if it doesn't match
  useEffect(()=>{if(!team&&teams.length)setCurTeamId(teams[0].id);},[team,teams]);

  const absMap=useMemo(()=>{
    const m={};
    (absences[team?.id]||[]).forEach(a=>{m[`${a.agentId}__${a.date}`]=a;});
    return m;
  },[absences,team]);

  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=fmt(now);

  function prevMonth(){if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextMonth(){if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}

  function handleCellClick(agent,dayNum){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const existing=absMap[`${agent.id}__${ds}`];
    setSelDay(ds);
    setAbsModal({agent,date:ds,existing});
  }

  function saveAbsence(agentId,dates,type,dateFrom,dateTo){
    setAbsences(prev=>{
      const teamAbs=prev[team.id]||[];
      const filtered=teamAbs.filter(a=>!(a.agentId===agentId&&dates.includes(a.date)));
      const added=dates.map(d=>({agentId,date:d,type,dateFrom,dateTo}));
      return{...prev,[team.id]:[...filtered,...added]};
    });
    setAbsModal(null);
  }

  function deleteAbsence(agentId,date){
    setAbsences(prev=>{
      const teamAbs=prev[team.id]||[];
      return{...prev,[team.id]:teamAbs.filter(a=>!(a.agentId===agentId&&a.date===date))};
    });
    setAbsModal(null);
  }

  function handleAutoAssign(){
    const res=autoAssign(team,absMap,selDay);
    setAssignments(prev=>({...prev,[`${team.id}__${selDay}`]:res}));
  }

  function setAssign(tourneeId,agentId){
    const key=`${team.id}__${selDay}`;
    setAssignments(prev=>({...prev,[key]:{...(prev[key]||{}),[tourneeId]:agentId||null}}));
  }

  function updateTeam(updater){setTeams(prev=>prev.map(t=>t.id===team.id?updater(t):t));}
  function updateAgent(agentId,updater){updateTeam(t=>({...t,agents:t.agents.map(a=>a.id===agentId?updater(a):a)}));}
  function addAgent(){updateTeam(t=>{const id=mkId();return{...t,agents:[...t.agents,{id,name:`Agent ${t.agents.length+1}`,color:AGENT_COLORS[t.agents.length%AGENT_COLORS.length],prefEnabled:false,preferred:[]}]};});}
  function removeAgent(id){updateTeam(t=>({...t,agents:t.agents.filter(a=>a.id!==id)}));}
  function updateTournee(tId,updater){updateTeam(t=>({...t,tournees:t.tournees.map(tt=>tt.id===tId?updater(tt):tt)}));}
  function addTournee(){updateTeam(t=>{const id=mkId();const num=t.tournees.length+1;return{...t,tournees:[...t.tournees,{id,name:`Tournée ${String(num).padStart(2,'0')}`,color:T_COLORS[num%T_COLORS.length],num}]};});}
  function removeTournee(id){updateTeam(t=>({...t,tournees:t.tournees.filter(tt=>tt.id!==id)}));}

  function createTeam(t){setTeams(prev=>[...prev,t]);setCurTeamId(t.id);setCreateTeamModal(false);}
  function deleteTeam(id){
    if(teams.length<=1)return;
    setTeams(prev=>{const n=prev.filter(t=>t.id!==id);if(curTeamId===id)setCurTeamId(n[0].id);return n;});
  }

  function applyImport({agents,tournees}){
    updateTeam(t=>({...t,agents,tournees}));
    setImportModal(false);
  }

  function exportCSV(){
    if(!team)return;
    const rows=[['Agent',...Array.from({length:daysInMonth},(_,i)=>`${year}-${String(month+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`)].join(',')];
    team.agents.forEach(a=>{
      const cells=[a.name];
      for(let d=1;d<=daysInMonth;d++){
        const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const abs=absMap[`${a.id}__${ds}`];
        cells.push(abs?abs.type:'P');
      }
      rows.push(cells.join(','));
    });
    const b=new Blob([rows.join('\n')],{type:'text/csv'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`planning_${team.name}_${year}_${month+1}.csv`;a.click();
  }

  const dayKey=`${team?.id}__${selDay}`;
  const dayAssign=assignments[dayKey]||{};
  const dayPresents=useMemo(()=>(team?.agents||[]).filter(a=>!absMap[`${a.id}__${selDay}`]),[team,absMap,selDay]);
  const dayAbsents=useMemo(()=>(team?.agents||[]).filter(a=>!!absMap[`${a.id}__${selDay}`]),[team,absMap,selDay]);
  const coveredCount=Object.values(dayAssign).filter(Boolean).length;
  const selDateObj=parseD(selDay);
  const selDateLabel=selDateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const monthAbsCount=useMemo(()=>{
    let n=0;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      (team?.agents||[]).forEach(a=>{if(absMap[`${a.id}__${ds}`])n++;});
    }
    return n;
  },[team,absMap,year,month,daysInMonth]);

  if(!team)return null;

  return(
    <div id="root" style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div className="topbar">
        <div>
          <div className="topbar-title">{team.name}</div>
          <div className="topbar-sub">{team.agents.length} agents · {team.tournees.length} tournées</div>
        </div>
        {tab==='planning'&&(
          <div className="month-nav">
            <button className="mnbtn" onClick={prevMonth}>‹</button>
            <span className="month-lbl">{FR_MONTHS[month]} {year}</span>
            <button className="mnbtn" onClick={nextMonth}>›</button>
          </div>
        )}
        <div style={{display:'flex',gap:6,marginLeft:tab==='planning'?0:'auto'}}>
          {tab==='planning'&&<button className="tbtn tbtn-g" onClick={exportCSV}>↓ CSV</button>}
          {tab==='planning'&&<button className="tbtn tbtn-g" onClick={()=>window.print()}>⎙</button>}
          <button className="tbtn tbtn-n" onClick={()=>setImportModal(true)}>↑ Import Excel</button>
        </div>
      </div>

      {/* Shell */}
      <div className="shell">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-logo">
            <div className="logo-mark">LP</div>
            <div>
              <div className="logo-text">La Poste RH</div>
              <div className="logo-sub">Gestion des tournées</div>
            </div>
          </div>
          <div className="sidebar-section">
            <div className="sidebar-section-label">Équipes</div>
            {teams.map(t=>(
              <div key={t.id} className={`team-item${t.id===team.id?' active':''}`} onClick={()=>setCurTeamId(t.id)}>
                <div className="team-dot" style={{background:t.color}}/>
                <span className="team-name">{t.name}</span>
                <span className="team-count">{t.agents.length}</span>
              </div>
            ))}
            <div className="add-team-btn" onClick={()=>setCreateTeamModal(true)}>
              <span style={{fontSize:16}}>＋</span> Nouvelle équipe
            </div>
          </div>
          <div style={{flex:1}}/>
          <div className="sidebar-nav">
            <div className="sidebar-section-label" style={{padding:'0 6px',marginBottom:6}}>Navigation</div>
            {[['planning','📅','Planning'],['agents','👤','Agents'],['tournees','🗺','Tournées']].map(([k,icon,lbl])=>(
              <div key={k} className={`nav-item${tab===k?' active':''}`} onClick={()=>setTab(k)}>
                <span className="nav-icon">{icon}</span>{lbl}
              </div>
            ))}
          </div>
          {teams.length>1&&(
            <div style={{padding:'0 12px 8px'}}>
              <button className="tbtn tbtn-d" style={{width:'100%',fontSize:11,padding:'6px'}}
                onClick={()=>deleteTeam(team.id)}>Supprimer l'équipe</button>
            </div>
          )}
        </div>

        {/* Planning view */}
        {tab==='planning'&&(
          <div className="main">
            {/* Calendar */}
            <div className="cal-panel">
              <div className="panel-card">
                <div className="panel-hdr">
                  <span className="phdr-title">Planning mensuel</span>
                  <span style={{marginLeft:'auto',fontSize:11,color:'var(--text2)'}}>{monthAbsCount} absences</span>
                </div>
                <div className="panel-scroll">
                  <div className="cal-grid" style={{'--days':daysInMonth}}>
                    <div className="ch-agent">Agent</div>
                    {Array.from({length:daysInMonth},(_,i)=>{
                      const d=i+1;
                      const dow=new Date(year,month,d).getDay();
                      const isWe=dow===0||dow===6;
                      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                      return(
                        <div key={d} className={`ch-day${ds===todayStr?' today':''}${isWe?' we':''}`}>
                          <div>{FR_DOW[(dow+6)%7]}</div>
                          <div style={{fontFamily:'Space Mono',fontSize:8,marginTop:1}}>{d}</div>
                        </div>
                      );
                    })}
                    {team.agents.map(agent=>(
                      <React.Fragment key={agent.id}>
                        <div className="ca-name">
                          <div className="ca-dot" style={{background:agent.color}}/>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis',fontSize:11}}>{agent.name}</span>
                        </div>
                        {Array.from({length:daysInMonth},(_,i)=>{
                          const d=i+1;
                          const dow=new Date(year,month,d).getDay();
                          const isWe=dow===0||dow===6;
                          const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                          const abs=absMap[`${agent.id}__${ds}`];
                          const at=abs?ABS_MAP[abs.type]:null;
                          return(
                            <div key={d}
                              className={`ca-cell${isWe?' we':''}${ds===selDay?' sel':''}${ds===todayStr?' tod':''}`}
                              onClick={()=>{setSelDay(ds);if(!isWe)handleCellClick(agent,d);}}
                              title={abs?`${agent.name} — ${at?.label||abs.type}`:'Présent'}>
                              {abs&&(
                                <div className="abs-lbl" style={{background:`${at?.color}20`,color:at?.color}}>
                                  {abs.type}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
                <div className="cal-legend">
                  {ABSENCE_TYPES.map(t=>(
                    <div key={t.code} className="leg-item">
                      <div className="leg-box" style={{background:`${t.color}30`,border:`1px solid ${t.color}`}}/>
                      {t.code}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Day panel */}
            <div className="day-panel">
              <div className="day-card" style={{flex:'0 0 auto'}}>
                <div className="day-card-hdr">
                  <div className="day-title">{selDateLabel}</div>
                  <div className="day-sub">{dayPresents.length} présents · {dayAbsents.length} absents</div>
                </div>
                <div className="presence-row">
                  <div className="pres-stat">
                    <div className="pres-dot" style={{background:'#22c55e'}}/>
                    <span className="pres-num" style={{color:'#4ade80'}}>{dayPresents.length}</span>
                    <span className="pres-lbl">présents</span>
                  </div>
                  <div className="pres-stat">
                    <div className="pres-dot" style={{background:'#ef4444'}}/>
                    <span className="pres-num" style={{color:'#f87171'}}>{dayAbsents.length}</span>
                    <span className="pres-lbl">absents</span>
                  </div>
                  <button className="tbtn tbtn-n" style={{marginLeft:'auto',padding:'4px 10px',fontSize:11}} onClick={handleAutoAssign}>⚡ Auto</button>
                </div>
                <div className="agent-chips">
                  {team.agents.map(a=>{
                    const isAbs=!!absMap[`${a.id}__${selDay}`];
                    return(
                      <span key={a.id} className={`achip${isAbs?' abs':''}`}
                        style={{background:isAbs?'rgba(255,255,255,0.04)':`${a.color}18`,
                          border:`1px solid ${isAbs?'rgba(255,255,255,0.08)':`${a.color}45`}`,
                          color:isAbs?'var(--text3)':a.color}}>
                        {a.name.split(' ').pop()}
                      </span>
                    );
                  })}
                </div>
              </div>

              <div className="day-card" style={{flex:1,overflow:'hidden'}}>
                <div className="panel-hdr">
                  <span className="phdr-title">Tournées</span>
                  <span style={{marginLeft:'auto',fontSize:10,color:'var(--text2)'}}>
                    {coveredCount}/{team.tournees.length}
                  </span>
                </div>
                <div className="tlist">
                  {team.tournees.map(t=>{
                    const aId=dayAssign[t.id];
                    const ag=team.agents.find(a=>a.id===aId);
                    return(
                      <div key={t.id} className="trow">
                        <div className="tnum" style={{background:t.color,border:'1px solid rgba(255,255,255,0.1)'}}>
                          {String(t.num||t.id.slice(0,2)).padStart(2,'0')}
                        </div>
                        <span className="tname">{t.name}</span>
                        <select className="asel"
                          value={aId||''}
                          onChange={e=>setAssign(t.id,e.target.value||null)}
                          style={{borderColor:ag?`${ag.color}55`:'',color:ag?ag.color:'var(--text2)'}}>
                          <option value="">—</option>
                          {dayPresents.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                        </select>
                      </div>
                    );
                  })}
                </div>
                <div className="day-footer">
                  {coveredCount===team.tournees.length
                    ?<div className="status-pill ok-pill">✓ Toutes les tournées couvertes</div>
                    :<div className="status-pill warn-pill">⚠ {team.tournees.length-coveredCount} non assignées</div>}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Agents view */}
        {tab==='agents'&&(
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <div className="panel-hdr" style={{borderRadius:0,borderTop:'none',borderLeft:'none',borderRight:'none',background:'rgba(255,255,255,0.03)'}}>
              <span className="phdr-title">Agents de l'équipe</span>
              <span style={{fontSize:11,color:'var(--text2)',marginLeft:8}}>{team.agents.length} agents</span>
              <button className="tbtn tbtn-y" style={{marginLeft:'auto'}} onClick={addAgent}>+ Ajouter</button>
            </div>
            <div className="view-agents">
              <div className="agents-grid">
                {team.agents.map(agent=>(
                  <div key={agent.id} className="agent-card">
                    <div className="ac-head">
                      <div className="ac-avatar" style={{background:agent.color}}>
                        {agent.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <input className="ac-nameInput" value={agent.name}
                          onChange={e=>updateAgent(agent.id,a=>({...a,name:e.target.value}))}/>
                        <div className="ac-role">Agent de distribution</div>
                      </div>
                      <button onClick={()=>removeAgent(agent.id)}
                        style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button>
                    </div>
                    <div className="ac-divider"/>
                    <div className="pref-row">
                      <span className="pref-lbl">Tournées préférentielles</span>
                      <div className={`toggle${agent.prefEnabled?' on':''}`}
                        onClick={()=>updateAgent(agent.id,a=>({...a,prefEnabled:!a.prefEnabled}))}/>
                      {agent.prefEnabled&&<span style={{fontSize:9,color:'var(--neon)',fontWeight:700}}>ON</span>}
                    </div>
                    {agent.prefEnabled&&(
                      <div className="pref-pills">
                        {team.tournees.map(t=>(
                          <div key={t.id}
                            className={`ppill${agent.preferred.includes(t.id)?' on':''}`}
                            onClick={()=>updateAgent(agent.id,a=>({...a,preferred:a.preferred.includes(t.id)?a.preferred.filter(x=>x!==t.id):[...a.preferred,t.id]}))}>
                            T{String(t.num||'?').toString().padStart(2,'0')}
                          </div>
                        ))}
                      </div>
                    )}
                    {!agent.prefEnabled&&<div style={{fontSize:10,color:'var(--text3)'}}>Toutes les tournées disponibles</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Tournées view */}
        {tab==='tournees'&&(
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <div className="panel-hdr" style={{borderRadius:0,borderTop:'none',borderLeft:'none',borderRight:'none',background:'rgba(255,255,255,0.03)'}}>
              <span className="phdr-title">Tournées</span>
              <span style={{fontSize:11,color:'var(--text2)',marginLeft:8}}>{team.tournees.length} tournées</span>
              <button className="tbtn tbtn-y" style={{marginLeft:'auto'}} onClick={addTournee}>+ Ajouter</button>
            </div>
            <div className="view-tournees">
              <div className="t-grid">
                {team.tournees.map(t=>(
                  <div key={t.id} className="t-card">
                    <div className="t-badge" style={{background:t.color}}>
                      {String(t.num||'').toString().padStart(2,'0')||'—'}
                    </div>
                    <input className="t-nameInput" value={t.name}
                      onChange={e=>updateTournee(t.id,tt=>({...tt,name:e.target.value}))}/>
                    <button onClick={()=>removeTournee(t.id)}
                      style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18,lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Stats bar */}
      <div className="stats-bar">
        <div className="sstat"><div className="sdot" style={{background:'#22c55e'}}/><span className="sval" style={{color:'#4ade80'}}>{dayPresents.length}</span><span className="slbl">présents</span></div>
        <div className="sstat"><div className="sdot" style={{background:'#ef4444'}}/><span className="sval" style={{color:'#f87171'}}>{dayAbsents.length}</span><span className="slbl">absents</span></div>
        <div className="sstat"><div className="sdot" style={{background:'var(--neon)'}}/><span className="sval">{coveredCount}/{team.tournees.length}</span><span className="slbl">couverts</span></div>
        <div className="sstat"><div className="sdot" style={{background:'var(--yellow)'}}/><span className="sval">{teams.length}</span><span className="slbl">équipes</span></div>
        <div className="sbar-right">{selDateLabel}</div>
      </div>

      {/* Modals */}
      {absModal&&<AbsenceModal {...absModal} onSave={saveAbsence} onDelete={deleteAbsence} onClose={()=>setAbsModal(null)}/>}
      {createTeamModal&&<CreateTeamModal onSave={createTeam} onClose={()=>setCreateTeamModal(false)}/>}
      {importModal&&<ImportModal team={team} onApply={applyImport} onClose={()=>setImportModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
