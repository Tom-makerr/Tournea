<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>La Poste — RH</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

/* ── Light theme (default) ── */
:root{
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --surface-2:#F5F5F7;
  --surface-3:#EBEBEF;
  --border:#E5E5EA;
  --border-strong:#D2D2D7;
  --text:#1d1d1f;
  --text-2:#6e6e73;
  --text-3:#a1a1a6;
  --accent:#007AFF;
  --accent-soft:#E6F0FF;
  --accent-hover:#0056b3;
  --success:#34C759;
  --warning:#FF9500;
  --danger:#FF3B30;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 20px 50px rgba(0,0,0,0.15),0 8px 16px rgba(0,0,0,0.08);
  --r-sm:8px;
  --r:12px;
  --r-lg:16px;
  --r-xl:20px;
  --t-fast:.15s cubic-bezier(.4,0,.2,1);
  --t:.2s cubic-bezier(.4,0,.2,1);
  --t-slow:.3s cubic-bezier(.4,0,.2,1);
}

/* ── Tweak: Corner personality ── */
html[data-tweak-corners="sharp"]{--r-sm:4px;--r:6px;--r-lg:8px;--r-xl:10px;}
html[data-tweak-corners="pill"]{--r-sm:14px;--r:20px;--r-lg:26px;--r-xl:32px;}
html[data-tweak-corners="sharp"] .btn,html[data-tweak-corners="sharp"] .btn-sm{border-radius:4px;}
html[data-tweak-corners="pill"] .btn{border-radius:999px;}
html[data-tweak-corners="pill"] .btn-sm{border-radius:999px;}
html[data-tweak-corners="pill"] .toggle{border-radius:999px;}
html[data-tweak-corners="pill"] .input{border-radius:999px;}
html[data-tweak-corners="pill"] textarea.input{border-radius:18px;}
html[data-tweak-corners="pill"] .card{border-radius:24px;}
html[data-tweak-corners="pill"] .chip{border-radius:999px;}
html[data-tweak-corners="sharp"] .chip{border-radius:3px;}
html[data-tweak-corners="sharp"] .card{border-radius:6px;}

/* ── Tweak: Card vibe ── */
html[data-tweak-card="elevated"] .card{box-shadow:var(--shadow-md);border-color:transparent;}
html[data-tweak-card="elevated"] .card-hover:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
html[data-tweak-card="outlined"] .card{box-shadow:none;border:1.5px solid var(--border-strong);}
html[data-tweak-card="outlined"] .card-hover:hover{border-color:var(--accent);box-shadow:none;}
html[data-tweak-card="outlined"] .sidebar{border-right-width:1.5px;}

/* ── Tweak: Calendar density ── */
html[data-tweak-cal="cozy"] .cal-cell{min-height:42px;}
html[data-tweak-cal="cozy"] .cal-agent-cell{padding:12px 14px;}
html[data-tweak-cal="cozy"] .cal-head,html[data-tweak-cal="cozy"] .cal-day-head{padding:14px 6px;}
html[data-tweak-cal="dense"] .cal-cell{min-height:24px;}
html[data-tweak-cal="dense"] .cal-agent-cell{padding:4px 12px;font-size:12px;}
html[data-tweak-cal="dense"] .cal-head,html[data-tweak-cal="dense"] .cal-day-head{padding:6px 4px;}
html[data-tweak-cal="dense"] .cal-day-head .day-name{font-size:9px;}
html[data-tweak-cal="dense"] .cal-day-head .day-num{font-size:10px;}
html[data-tweak-cal="dense"] .abs-tag{font-size:8px;}

/* ── Dark theme ── */
html[data-theme="dark"]{
  --bg:#000000;
  --surface:#1c1c1e;
  --surface-2:#2c2c2e;
  --surface-3:#3a3a3c;
  --border:#38383a;
  --border-strong:#48484a;
  --text:#ffffff;
  --text-2:#98989f;
  --text-3:#6c6c70;
  --accent:#0A84FF;
  --accent-soft:rgba(10,132,255,0.15);
  --accent-hover:#3395ff;
  --success:#30D158;
  --warning:#FF9F0A;
  --danger:#FF453A;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow:0 2px 8px rgba(0,0,0,0.4);
  --shadow-md:0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:0 20px 50px rgba(0,0,0,0.6);
}

html,body{height:100%;overflow:hidden;font-family:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);transition:background var(--t),color var(--t);font-size:14px;letter-spacing:-0.005em;}
#root{height:100vh;display:flex;flex-direction:column;}

/* ── Typography ── */
.h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;}
.h2{font-size:22px;font-weight:700;letter-spacing:-0.015em;}
.h3{font-size:17px;font-weight:600;letter-spacing:-0.01em;}
.h4{font-size:15px;font-weight:600;}
.body{font-size:14px;font-weight:400;line-height:1.5;}
.caption{font-size:13px;color:var(--text-2);}
.label-sm{font-size:11px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

/* ── Sidebar (default plain) ── */
.sidebar{
  width:248px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  transition:background var(--t),border-color var(--t);
}
.sidebar > *{position:relative;z-index:1;}

/* ── Liquid Glass mode (toggle in Settings) ── */
html[data-liquid-glass="on"] .sidebar{
  background:
    linear-gradient(165deg, color-mix(in srgb, var(--accent) 18%, transparent) 0%, color-mix(in srgb, var(--accent) 6%, transparent) 45%, color-mix(in srgb, var(--accent) 2%, transparent) 100%),
    var(--surface);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-right:1px solid color-mix(in srgb, var(--accent) 12%, var(--border));
  box-shadow:inset 0 1px 0 color-mix(in srgb, var(--accent) 25%, transparent), inset -1px 0 0 color-mix(in srgb, var(--accent) 8%, transparent);
}
html[data-liquid-glass="on"] .sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, color-mix(in srgb, var(--accent) 22%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 100%, color-mix(in srgb, var(--accent) 12%, transparent) 0%, transparent 60%);
  opacity:0.7;z-index:0;
}
html[data-liquid-glass="on"][data-theme="dark"] .sidebar{
  background:
    linear-gradient(165deg, color-mix(in srgb, var(--accent) 22%, transparent) 0%, color-mix(in srgb, var(--accent) 8%, transparent) 50%, transparent 100%),
    var(--surface);
}
html[data-liquid-glass="on"] .sb-item:hover{background:color-mix(in srgb, var(--accent) 8%, transparent);}
html[data-liquid-glass="on"] .sb-item.active{background:color-mix(in srgb, var(--accent) 14%, transparent);}

/* Topbar tinted */
html[data-liquid-glass="on"] .topbar{
  background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, var(--surface)) 0%, var(--surface) 100%);
  border-bottom:1px solid color-mix(in srgb, var(--accent) 10%, var(--border));
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
}

/* Main content + body tint */
html[data-liquid-glass="on"] body{
  background:var(--bg);
}
html[data-liquid-glass="on"] body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 50% 40% at 100% 0%, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 0% 100%, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 60%);
  opacity:0.8;
}
html[data-liquid-glass="on"] #root{position:relative;z-index:1;}

/* Cards: subtle accent edge + frosted */
html[data-liquid-glass="on"] .card{
  background:color-mix(in srgb, var(--accent) 2%, var(--surface));
  border:1px solid color-mix(in srgb, var(--accent) 8%, var(--border));
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
}

/* Buttons primary glow */
html[data-liquid-glass="on"] .btn-primary{
  background:linear-gradient(180deg, color-mix(in srgb, white 18%, var(--accent)) 0%, var(--accent) 100%);
  box-shadow:0 1px 0 rgba(255,255,255,0.25) inset, 0 4px 12px color-mix(in srgb, var(--accent) 40%, transparent);
}
.sb-brand{padding:22px 20px 18px;display:flex;align-items:center;gap:11px;}
.sb-logo{width:36px;height:36px;border-radius:10px;background:var(--text);color:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;letter-spacing:-0.5px;}
.sb-brand-title{font-size:15px;font-weight:600;line-height:1.2;letter-spacing:-0.01em;}
.sb-brand-sub{font-size:12px;color:var(--text-2);margin-top:2px;}

.sb-section{padding:6px 12px;}
.sb-section-label{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;padding:14px 8px 6px;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  cursor:pointer;font-size:14px;font-weight:500;color:var(--text);
  transition:background var(--t-fast);
}
.sb-item:hover{background:var(--surface-2);}
.sb-item.active{background:var(--surface-2);}
.sb-item.active .sb-icon{color:var(--accent);}
.sb-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-2);}
.sb-item-team{padding:7px 10px;font-size:13px;}
.sb-item-team .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;line-height:1.4;}
.sb-count{margin-left:auto;font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums;}
.sb-add{font-size:13px;color:var(--text-2);font-weight:500;}
.sb-add:hover{color:var(--accent);}

.sb-user{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.sb-user-inner{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;flex-shrink:0;}

/* ── Topbar ── */
.topbar{
  height:60px;flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:14px;
  transition:background var(--t),border-color var(--t);
}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-0.015em;}
.topbar-sub{font-size:13px;color:var(--text-2);}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:34px;padding:0 14px;border-radius:8px;
  border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  transition:all var(--t-fast);
  white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface-3);}
.btn-tinted{background:var(--accent-soft);color:var(--accent);}
.btn-tinted:hover{background:color-mix(in srgb,var(--accent) 15%,var(--surface));}
.btn-ghost{background:transparent;color:var(--text);}
.btn-ghost:hover{background:var(--surface-2);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{filter:brightness(0.92);}
.btn-danger-tinted{background:rgba(255,59,48,0.1);color:var(--danger);}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:7px;}
.btn-icon{width:34px;padding:0;}
.btn-lg{height:42px;padding:0 22px;font-size:14px;border-radius:10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Form fields ── */
.field-label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
.input{
  width:100%;height:38px;padding:0 12px;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:9px;
  font-family:inherit;font-size:14px;color:var(--text);
  transition:border-color var(--t-fast),box-shadow var(--t-fast);
  outline:none;
}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
textarea.input{padding:10px 12px;height:auto;min-height:80px;resize:vertical;line-height:1.5;}
select.input{cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;padding-right:30px;-webkit-appearance:none;appearance:none;}
input[type=date].input{color-scheme:light;}
html[data-theme="dark"] input[type=date].input{color-scheme:dark;}

/* ── Cards ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  transition:box-shadow var(--t),border-color var(--t);
}
.card-hover:hover{box-shadow:var(--shadow-md);}
.card-padded{padding:20px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;}

/* ── Segmented control (iOS-style) ── */
.segmented{
  display:inline-flex;background:var(--surface-2);border-radius:9px;padding:2px;gap:0;
}
.segmented button{
  border:none;background:transparent;
  padding:6px 14px;border-radius:7px;
  font-family:inherit;font-size:12px;font-weight:600;color:var(--text);
  cursor:pointer;transition:all var(--t-fast);
}
.segmented button.active{background:var(--surface);box-shadow:var(--shadow-sm);color:var(--text);}
html[data-theme="dark"] .segmented button.active{background:var(--surface-3);}

/* ── Toggle (iOS-style) ── */
.toggle{
  width:46px;height:28px;border-radius:14px;
  background:var(--surface-3);
  position:relative;cursor:pointer;
  transition:background var(--t);flex-shrink:0;
}
.toggle.on{background:var(--success);}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:24px;height:24px;border-radius:50%;background:#fff;
  box-shadow:var(--shadow);transition:transform var(--t);
}
.toggle.on::after{transform:translateX(18px);}

/* ── Status chips ── */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:6px;
  font-size:11px;font-weight:600;
}
.chip-success{background:rgba(52,199,89,0.12);color:var(--success);}
.chip-warning{background:rgba(255,149,0,0.12);color:var(--warning);}
.chip-danger{background:rgba(255,59,48,0.12);color:var(--danger);}
.chip-info{background:var(--accent-soft);color:var(--accent);}
.chip-neutral{background:var(--surface-2);color:var(--text-2);}

/* ── Layout ── */
.shell{flex:1;display:flex;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.scroll-content{flex:1;overflow-y:auto;}

/* ── Calendar ── */
.cal{
  display:grid;
  min-width:max-content;
}
.cal-head,.cal-day-head{
  background:var(--surface);position:sticky;top:0;z-index:3;
  border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:.4px;
  padding:10px 6px;text-align:center;
}
.cal-head{text-align:left;padding:10px 14px;}
.cal-day-head .day-name{font-size:10px;}
.cal-day-head .day-num{font-size:11px;color:var(--text);margin-top:2px;font-variant-numeric:tabular-nums;}
.cal-day-head.today .day-num{background:var(--accent);color:#fff;border-radius:50%;display:inline-block;width:20px;height:20px;line-height:20px;}
.cal-day-head.we{color:var(--text-3);}
.cal-day-head.hol .day-num{color:var(--warning);}
.cal-agent-cell{
  position:sticky;left:0;z-index:2;
  background:var(--surface);
  padding:8px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;font-size:13px;font-weight:500;
}
.cal-agent-cell .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cal-cell{
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  min-height:34px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background var(--t-fast);
  position:relative;
}
.cal-cell:hover{background:var(--surface-2);}
.cal-cell.sel{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent);}
.cal-cell.we{background:var(--surface-2);}
.cal-cell.hol{background:rgba(255,149,0,0.06);}
.abs-tag{
  width:calc(100% - 4px);height:calc(100% - 4px);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;letter-spacing:.2px;
}
.hol-dot{width:4px;height:4px;border-radius:50%;background:var(--warning);}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;
  padding:20px;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--surface);
  border-radius:18px;
  width:100%;max-width:460px;max-height:90vh;
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{padding:22px 24px 0;}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-0.015em;}
.modal-sub{font-size:13px;color:var(--text-2);margin-top:4px;}
.modal-body{padding:18px 24px 0;}
.modal-footer{
  padding:18px 24px 22px;
  display:flex;gap:8px;justify-content:flex-end;
}

/* ── Tab bar mobile ── */
.tabbar{
  height:60px;background:var(--surface);
  border-top:1px solid var(--border);
  display:none;align-items:center;justify-content:space-around;
}
.tabbar-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 12px;font-size:10px;color:var(--text-2);cursor:pointer;
}
.tabbar-item.active{color:var(--accent);}

/* ── Empty states ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;text-align:center;color:var(--text-2);
}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.6;}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty-text{font-size:13px;max-width:340px;line-height:1.5;}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);}

/* Avatar */
.avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;flex-shrink:0;letter-spacing:-0.5px;
}

/* Color swatches */
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform var(--t-fast);}
.swatch:hover{transform:scale(1.1);}
.swatch.selected{border-color:var(--text);transform:scale(1.1);}

/* ── List rows ── */
.list-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  transition:background var(--t-fast);
}
.list-row:last-child{border-bottom:none;}
.list-row.clickable{cursor:pointer;}
.list-row.clickable:hover{background:var(--surface-2);}

/* ── Progress bar ── */
.progress{
  height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;
  position:relative;
}
.progress-fill{
  height:100%;border-radius:3px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
}
.progress-target{

function getEaster(y) {
  const a = y % 19,b = Math.floor(y / 100),c = y % 100,d = Math.floor(b / 4),e = b % 4,f = Math.floor((b + 8) / 25),g = Math.floor((b - f + 1) / 3),h = (19 * a + b - d - g + 15) % 30,i = Math.floor(c / 4),k = c % 4,l = (32 + 2 * e + 2 * i - h - k) % 7,m = Math.floor((a + 11 * h + 22 * l) / 451),month = Math.floor((h + l - 7 * m + 114) / 31),day = (h + l - 7 * m + 114) % 31 + 1;
  return new Date(y, month - 1, day);
}
function getFrHolidays(year) {
  const e = getEaster(year);
  const add = (d, n) => {const x = new Date(d);x.setDate(x.getDate() + n);return fmt(x);};
  return new Set([
  `${year}-01-01`, add(e, 1), `${year}-05-01`, `${year}-05-08`,
  add(e, 39), add(e, 50), `${year}-07-14`, `${year}-08-15`,
  `${year}-11-01`, `${year}-11-11`, `${year}-12-25`]
  );
}

function autoAssign(team, absMap, dateStr) {
  const present = (team.agents || []).filter((a) => !absMap[`${a.id}__${dateStr}`]);

  });

}

function ImportModal({ onApply, onClose }) {
  const [drag, setDrag] = useState(false);
  const [parsed, setParsed] = useState(null);
  const [err, setErr] = useState('');
  const fileRef = useRef();
  function parseXlsx(ab) {
    try {
      const wb = XLSX.read(ab, { type: 'array' });
      const name = wb.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
      const agents = [...new Set(rows.slice(1).map((r) => String(r[0] || '').trim()).filter((v) => v && v.length > 2 && v.length < 40 && !/^\d/.test(v)))].slice(0, 80);
      const tournees = [...new Set(rows[0]?.slice(1).map((c) => String(c || '').trim()).filter((v) => v && v.length > 0 && v.length < 30) || [])].slice(0, 100);
      setParsed({ agents, tournees, sheet: name });setErr('');
    } catch (e) {setErr('Erreur: ' + e.message);}
  }
  function handleFile(f) {const r = new FileReader();r.onload = (e) => parseXlsx(e.target.result);r.readAsArrayBuffer(f);}
  function apply() {
    const agents = (parsed?.agents || []).map((name, i) => ({ id: mkId(), name, color: AGENT_COLORS[i % AGENT_COLORS.length], prefEnabled: false, preferred: [] }));
    const tournees = (parsed?.tournees || []).map((name, i) => ({ id: mkId(), name, color: T_COLORS[i % T_COLORS.length], num: i + 1, categoryId: null }));
    onApply({ agents, tournees });
  }
  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 520 }}>
        <div className="modal-header">
          <div className="modal-title">Import Excel</div>
          <div className="modal-sub">Agents (col A) et tournées (ligne 1) détectés automatiquement</div>
        </div>
        <div className="modal-body">
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{ display: 'none' }} onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
          <div className={`dropzone${drag ? ' over' : ''}`}
          onDragOver={(e) => {e.preventDefault();setDrag(true);}}
          onDragLeave={() => setDrag(false)}
          onDrop={(e) => {e.preventDefault();setDrag(false);if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);}}
          onClick={() => fileRef.current.click()}>
            <Icon name="upload" size={32} />
            <div style={{ fontWeight: 600, marginTop: 10 }}>Glissez votre fichier Excel</div>
            <div className="caption" style={{ marginTop: 4 }}>ou cliquez pour sélectionner</div>
          </div>
          {err && <div className="chip chip-danger" style={{ marginTop: 12 }}>⚠ {err}</div>}
          {parsed && !err &&
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 14 }}>
              <div style={{ padding: 14, background: 'var(--surface-2)', borderRadius: 12 }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--accent)' }}>{parsed.agents.length}</div>
                <div className="caption" style={{ fontWeight: 500 }}>agents détectés</div>
              </div>
              <div style={{ padding: 14, background: 'var(--surface-2)', borderRadius: 12 }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--success)' }}>{parsed.tournees.length}</div>
                <div className="caption" style={{ fontWeight: 500 }}>tournées détectées</div>
              </div>
            </div>
          }
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
          {parsed && !err && <button className="btn btn-primary" onClick={apply}>Appliquer</button>}
        </div>
      </div>
    </div>);

}

function AbsencesSummary({ team, absMap, year, month }) {
  const [selectedAgents, setSelectedAgents] = useState(new Set());
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const allAgents = team.agents || [];
  const filterActive = selectedAgents.size > 0;
  const filteredAgents = filterActive ? allAgents.filter(a => selectedAgents.has(a.id)) : allAgents;

  const perAgent = filteredAgents.map(a => {
    const byType = {};
    let total = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const abs = absMap[`${a.id}__${ds}`];
      if (abs) { byType[abs.type] = (byType[abs.type] || 0) + 1; total++; }
    }
    return { agent: a, byType, total };
  }).sort((x, y) => y.total - x.total);

  const totalsByType = {};
  let grandTotal = 0;
  perAgent.forEach(({ byType }) => {
    Object.entries(byType).forEach(([k, v]) => { totalsByType[k] = (totalsByType[k] || 0) + v; grandTotal += v; });
  });
  const sortedTypes = Object.entries(totalsByType).sort((a, b) => b[1] - a[1]);

  function toggleAgent(id) {
    setSelectedAgents(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  }

  return (
    <div style={{ borderTop: '1px solid var(--border)', padding: '14px 18px 16px', flexShrink: 0, background: 'var(--surface)' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 10 }}>
        <span className="label-sm">Aperçu des absences</span>
        <span className="caption">{FR_MONTHS[month]} {year}</span>
        <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'baseline', gap: 4 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: grandTotal > 0 ? 'var(--danger)' : 'var(--success)', letterSpacing: '-0.01em' }}>{grandTotal}</span>
          <span className="caption">jour{grandTotal > 1 ? 's' : ''} d'absence</span>
        </span>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 12 }}>
        <button onClick={() => setSelectedAgents(new Set())}
          style={{ height: 24, padding: '0 9px', borderRadius: 6, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', transition: '.12s',
            background: !filterActive ? 'var(--accent)' : 'var(--surface)',
            borderColor: !filterActive ? 'var(--accent)' : 'var(--border)',
            color: !filterActive ? '#fff' : 'var(--text-2)' }}>
          Tous ({allAgents.length})
        </button>
        {allAgents.map(a => {
          const on = selectedAgents.has(a.id);
          return (
            <button key={a.id} onClick={() => toggleAgent(a.id)}
              style={{ height: 24, padding: '0 9px', borderRadius: 6, border: '1px solid', fontSize: 11, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', display: 'inline-flex', alignItems: 'center', gap: 5,
                background: on ? `${a.color}20` : 'var(--surface)',
                borderColor: on ? a.color : 'var(--border)',
                color: on ? a.color : 'var(--text-2)', transition: '.12s' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: a.color }} />
              {a.name}
            </button>
          );
        })}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 16, alignItems: 'start' }}>
        <div>
          <div className="label-sm" style={{ marginBottom: 7 }}>Par type</div>
          {sortedTypes.length === 0 ? (
            <div className="caption" style={{ padding: '6px 0' }}>Aucune absence</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {sortedTypes.map(([code, n]) => {
                const at = ABS_MAP[code];
                if (!at) return null;
                return (
                  <div key={code} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                    <span style={{ width: 8, height: 8, borderRadius: 2, background: at.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 12, color: at.color, fontWeight: 600 }}>{at.label}</span>
                    <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text)', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{n}j</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div>
          <div className="label-sm" style={{ marginBottom: 7 }}>Par agent</div>
          {perAgent.filter(x => x.total > 0).length === 0 ? (
            <div className="caption" style={{ padding: '6px 0' }}>{filterActive ? 'Les agents sélectionnés n\'ont aucune absence ce mois.' : 'Tous les agents sont présents.'}</div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(170px,1fr))', gap: 6, maxHeight: 110, overflowY: 'auto', paddingRight: 4 }}>
              {perAgent.filter(x => x.total > 0).map(({ agent, byType, total }) => (
                <div key={agent.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '5px 8px', borderRadius: 8, background: 'var(--surface-2)' }}>
                  <Avatar name={agent.name} color={agent.color} size={22} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600 }} className="truncate">{agent.name}</div>
                    <div style={{ display: 'flex', gap: 3, marginTop: 2, flexWrap: 'wrap' }}>
                      {Object.entries(byType).map(([code, n]) => {
                        const at = ABS_MAP[code];
                        return (
                          <span key={code} title={`${at?.label} · ${n}j`} style={{ padding: '0 5px', borderRadius: 3, fontSize: 9, fontWeight: 700, background: `${at?.color}22`, color: at?.color, lineHeight: '14px' }}>
                            {code}·{n}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', fontVariantNumeric: 'tabular-nums' }}>{total}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function PlanningView({ team, year, month, setYear, setMonth, selDay, setSelDay, absMap, assignments, setAssignments, onCellClick, holidays, updateTeam }) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = fmt(new Date());
  const dayKey = `${team.id}__${selDay}`;
  const dayAssign = assignments[dayKey] || {};
  const selDate = parseD(selDay);
  const selLabel = selDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  const [catFilter, setCatFilter] = useState('all');
  const [editingTarget, setEditingTarget] = useState(false);
  const [targetDraft, setTargetDraft] = useState(team.targetPresence || 5);

  useEffect(() => {setTargetDraft(team.targetPresence || 5);}, [team.targetPresence]);

  const dayPresents = (team.agents || []).filter((a) => !absMap[`${a.id}__${selDay}`]);
  const dayAbsents = (team.agents || []).filter((a) => !!absMap[`${a.id}__${selDay}`]);
  const visibleTournees = catFilter === 'all' ? team.tournees : catFilter === 'none' ? team.tournees.filter((t) => !t.categoryId) : team.tournees.filter((t) => t.categoryId === catFilter);
  const covered = visibleTournees.filter((t) => dayAssign[t.id]).length;
  const target = team.targetPresence || Math.ceil((team.agents || []).length * 0.8);
  const presColor = dayPresents.length >= target ? 'var(--success)' : dayPresents.length >= target * 0.7 ? 'var(--warning)' : 'var(--danger)';
  const totalAg = (team.agents || []).length;

  function doAutoAssign() {
    const present = dayPresents;
    if (!present.length) return;
    const tournees = visibleTournees;
    const res = { ...dayAssign };
    // Track categories each agent has across the WHOLE day (not just visible)
    const agentCategories = {};
    Object.entries(res).forEach(([tId, aId]) => {
      if (!aId) return;
      const t = team.tournees.find((x) => x.id === tId);
      if (!t) return;
      const cat = t.categoryId || '__none';
      (agentCategories[aId] = agentCategories[aId] || new Set()).add(cat);
    });
    // Clear visible tournees so they get re-distributed
    visibleTournees.forEach((t) => {
      const aId = res[t.id];
      if (aId) {
        const tCat = t.categoryId || '__none';
        agentCategories[aId]?.delete(tCat);
      }
      delete res[t.id];
    });
    // Distribute respecting: 1 tournée per category per agent per day
    let idx = 0;
    tournees.forEach((t) => {
      const tCat = t.categoryId || '__none';
      // Eligible: doesn't already have this category, matches pref
      let elig = present.filter((a) => {
        if (agentCategories[a.id]?.has(tCat)) return false;
        if (a.prefEnabled && a.preferred?.length > 0) return a.preferred.includes(t.id);
        return true;
      });
      if (elig.length === 0) {
        // Relax pref constraint, keep category constraint
        elig = present.filter((a) => !agentCategories[a.id]?.has(tCat));
      }
      if (elig.length === 0) {idx++;return;}
      const chosen = elig[idx % elig.length];
      res[t.id] = chosen.id;
      (agentCategories[chosen.id] = agentCategories[chosen.id] || new Set()).add(tCat);
      idx++;
    });
    setAssignments((prev) => ({ ...prev, [dayKey]: res }));
  }
  function clearAssignments() {setAssignments((prev) => ({ ...prev, [dayKey]: {} }));}
  function setAssign(tId, aId) {setAssignments((prev) => ({ ...prev, [dayKey]: { ...(prev[dayKey] || {}), [tId]: aId || null } }));}
  function prevMonth() {if (month === 0) {setMonth(11);setYear((y) => y - 1);} else setMonth((m) => m - 1);}
  function nextMonth() {if (month === 11) {setMonth(0);setYear((y) => y + 1);} else setMonth((m) => m + 1);}
  function saveTarget() {const n = Math.max(1, Math.min(99, parseInt(targetDraft) || 1));updateTeam((t) => ({ ...t, targetPresence: n }));setEditingTarget(false);}

  const cats = team.categories || [];
  const noneCount = team.tournees.filter((t) => !t.categoryId).length;

  return (
    <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
      {/* Calendar */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '0px', overflow: 'hidden' }}>
        <div className="card" style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div className="card-header">
            <div>
              <div className="card-title">{FR_MONTHS[month]} {year}</div>
              <div className="caption" style={{ marginTop: 2 }}>{totalAg} agent{totalAg > 1 ? 's' : ''}</div>
            </div>

            {/* Day stats inline */}
            <div style={{ marginLeft: 24, display: 'flex', alignItems: 'center', gap: 14, padding: '6px 14px', borderRadius: 12, background: 'var(--surface-2)', flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.1 }}>
                <span className="caption" style={{ textTransform: 'capitalize', fontSize: 11 }}>{selLabel}</span>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style={{ fontSize: 18, fontWeight: 700, color: presColor, letterSpacing: '-0.01em', fontVariantNumeric: 'tabular-nums' }}>{dayPresents.length}</span>
                  <span style={{ fontSize: 11, color: 'var(--text-2)' }}>/ {totalAg} présents</span>
                </div>
              </div>
              <div style={{ width: 80, display: 'flex', flexDirection: 'column', gap: 4 }}>
                <div className="progress" style={{ height: 5 }}>
                  <div className="progress-fill" style={{ width: `${Math.min(100, dayPresents.length / (totalAg || 1) * 100)}%`, background: presColor }} />
                  <div className="progress-target" style={{ left: `${Math.min(100, target / (totalAg || 1) * 100)}%` }} />
                </div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 10, color: 'var(--text-2)' }}>
                  <span>Objectif</span>
                  {editingTarget ?
                    <input type="number" min="1" max="99" value={targetDraft}
                      onChange={(e) => setTargetDraft(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter') saveTarget(); if (e.key === 'Escape') setEditingTarget(false); }}
                      onBlur={saveTarget}
                      autoFocus
                      style={{ width: 32, height: 18, padding: '0 3px', border: '1.5px solid var(--accent)', borderRadius: 4, fontFamily: 'inherit', fontSize: 11, fontWeight: 700, color: 'var(--text)', background: 'var(--surface)', textAlign: 'center' }} /> :
                    <button onClick={() => setEditingTarget(true)}
                      style={{ background: 'transparent', border: 'none', padding: 0, cursor: 'pointer', fontFamily: 'inherit', fontSize: 11, fontWeight: 700, color: 'var(--text)', display: 'inline-flex', alignItems: 'center', gap: 3 }}
                      title="Modifier">
                      {target}<Icon name="edit" size={9} />
                    </button>
                  }
                </div>
              </div>
              {dayAbsents.length > 0 && (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, maxWidth: 380, paddingLeft: 12, borderLeft: '1px solid var(--border)' }}>
                  {dayAbsents.slice(0, 6).map((a) => {
                    const abs = absMap[`${a.id}__${selDay}`];
                    const at = ABS_MAP[abs.type];
                    return (
                      <span key={a.id} className="chip" style={{ background: `${at.color}15`, color: at.color, fontSize: 10 }}>
                        {lastName(a.name)} · {abs.type}
                      </span>);
                  })}
                  {dayAbsents.length > 6 && <span className="chip chip-neutral" style={{ fontSize: 10 }}>+{dayAbsents.length - 6}</span>}
                </div>
              )}
            </div>

            <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
              <button className="btn btn-secondary btn-icon" onClick={prevMonth}><Icon name="chevron-left" size={16} /></button>
              <button className="btn btn-secondary btn-sm" onClick={() => {const n = new Date();setYear(n.getFullYear());setMonth(n.getMonth());setSelDay(fmt(n));}}>Aujourd'hui</button>
              <button className="btn btn-secondary btn-icon" onClick={nextMonth}><Icon name="chevron-right" size={16} /></button>
            </div>
          </div>
          <div style={{ flex: 1, overflow: 'auto' }}>
            <div className="cal" style={{ gridTemplateColumns: `180px repeat(${daysInMonth},minmax(34px,1fr))` }}>
              <div className="cal-head">Agent</div>
              {Array.from({ length: daysInMonth }, (_, i) => {
                const d = i + 1,dow = new Date(year, month, d).getDay(),isWe = dow === 0 || dow === 6;
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isHol = holidays.has(ds);
                return (
                  <div key={d} className={`cal-day-head${ds === today ? ' today' : ''}${isWe ? ' we' : ''}${isHol ? ' hol' : ''}`}>
                    <div className="day-name">{FR_DOW[(dow + 6) % 7]}</div>
                    <div className="day-num">{d}</div>
                  </div>);

              })}
              {(team.agents || []).map((agent) =>
              <React.Fragment key={agent.id}>
                  <div className="cal-agent-cell">
                    <div className="dot" style={{ background: agent.color }} />
                    <span className="truncate">{agent.name}</span>
                  </div>
                  {Array.from({ length: daysInMonth }, (_, i) => {
                  const d = i + 1,dow = new Date(year, month, d).getDay(),isWe = dow === 0 || dow === 6;
                  const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                  const abs = absMap[`${agent.id}__${ds}`];
                  const at = abs ? ABS_MAP[abs.type] : null;
                  const isHol = holidays.has(ds);
                  return (
                    <div key={d}
                    className={`cal-cell${isWe ? ' we' : ''}${ds === selDay ? ' sel' : ''}${isHol ? ' hol' : ''}`}
                    onClick={() => {setSelDay(ds);if (!isWe && !isHol) onCellClick(agent, ds);}}
                    title={abs ? `${agent.name} — ${at?.label}` : isHol ? 'Jour férié' : 'Présent'}>
                        {abs && <div className="abs-tag" style={{ background: `${at?.color}25`, color: at?.color }}>{abs.type}</div>}
                        {isHol && !abs && <div className="hol-dot" />}
                      </div>);

                })}
                </React.Fragment>
              )}
            </div>
          </div>
          <AbsencesSummary team={team} absMap={absMap} year={year} month={month}/>
        </div>
      </div>

      {/* Day panel removed — calendar prend toute la largeur. Présence intégrée au header. */}
    </div>);

}

// ═══ OPTIMISATION VIEW ════════════════════════════════════════════════════
function OptimisationView({ team, selDay, setSelDay, absMap, assignments, setAssignments }) {
  const [catFilter, setCatFilter] = useState('all');
  const dayKey = `${team.id}__${selDay}`;
  const dayAssign = assignments[dayKey] || {};
  const selDate = parseD(selDay);
  const selLabel = selDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const cats = team.categories || [];
  const noneCount = team.tournees.filter((t) => !t.categoryId).length;

  const dayPresents = (team.agents || []).filter((a) => !absMap[`${a.id}__${selDay}`]);
  const visibleTournees = catFilter === 'all' ? team.tournees : catFilter === 'none' ? team.tournees.filter((t) => !t.categoryId) : team.tournees.filter((t) => t.categoryId === catFilter);
  const covered = visibleTournees.filter((t) => dayAssign[t.id]).length;

  function doAutoAssign() {
    const present = dayPresents;
    if (!present.length) return;
    const tournees = visibleTournees;
    const res = { ...dayAssign };
    const agentCategories = {};
    Object.entries(res).forEach(([tId, aId]) => {
      if (!aId) return;
      const t = team.tournees.find((x) => x.id === tId);
      if (!t) return;
      const cat = t.categoryId || '__none';
      (agentCategories[aId] = agentCategories[aId] || new Set()).add(cat);
    });
    visibleTournees.forEach((t) => {
      const aId = res[t.id];
      if (aId) {
        const tCat = t.categoryId || '__none';
        agentCategories[aId]?.delete(tCat);
      }
      delete res[t.id];
    });
    let idx = 0;
    tournees.forEach((t) => {
      const tCat = t.categoryId || '__none';
      let elig = present.filter((a) => {
        if (agentCategories[a.id]?.has(tCat)) return false;
        if (a.prefEnabled && a.preferred?.length > 0) return a.preferred.includes(t.id);
        return true;
      });
      if (elig.length === 0) elig = present.filter((a) => !agentCategories[a.id]?.has(tCat));
      if (elig.length === 0) { idx++; return; }
      const chosen = elig[idx % elig.length];
      res[t.id] = chosen.id;
      (agentCategories[chosen.id] = agentCategories[chosen.id] || new Set()).add(tCat);
      idx++;
    });
    setAssignments((prev) => ({ ...prev, [dayKey]: res }));
  }
  function clearAssignments() { setAssignments((prev) => ({ ...prev, [dayKey]: {} })); }
  function setAssign(tId, aId) { setAssignments((prev) => ({ ...prev, [dayKey]: { ...(prev[dayKey] || {}), [tId]: aId || null } })); }

  // Recap data
  const agentRecap = {};
  Object.entries(dayAssign).forEach(([tId, aId]) => {
    if (!aId) return;
    const t = team.tournees.find((x) => x.id === tId);
    if (!t) return;
    (agentRecap[aId] = agentRecap[aId] || []).push(t);
  });
  const assignedAgents = dayPresents.filter((a) => agentRecap[a.id]);
  const idleAgents = dayPresents.filter((a) => !agentRecap[a.id]);
  const usedCats = new Set();
  Object.values(agentRecap).forEach(ts => ts.forEach(t => usedCats.add(t.categoryId || '__none')));
  const columns = [...cats.filter(c => usedCats.has(c.id)), ...(usedCats.has('__none') ? [{ id: '__none', name: 'Sans prestation', color: '#8E8E93' }] : [])];
  const violations = new Set();
  Object.entries(agentRecap).forEach(([aId, ts]) => {
    const catCount = {};
    ts.forEach(t => { const c = t.categoryId || '__none'; catCount[c] = (catCount[c] || 0) + 1; });
    if (Object.values(catCount).some(n => n > 1)) violations.add(aId);
  });

  function changeDay(delta) {
    const d = parseD(selDay);
    d.setDate(d.getDate() + delta);
    setSelDay(fmt(d));
  }

  return (
    <div className="main">
      {/* Header */}
      <div style={{ padding: '24px 28px 16px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div>
          <div className="h2">Optimisation</div>
          <div className="caption" style={{ marginTop: 2, textTransform: 'capitalize' }}>{selLabel}</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
          <button className="btn btn-secondary btn-icon" onClick={() => changeDay(-1)} title="Jour précédent"><Icon name="chevron-left" size={16} /></button>
          <input type="date" className="input" style={{ height: 34, width: 160, fontSize: 13 }}
            value={selDay} onChange={(e) => setSelDay(e.target.value)} />
          <button className="btn btn-secondary btn-sm" onClick={() => setSelDay(fmt(new Date()))}>Aujourd'hui</button>
          <button className="btn btn-secondary btn-icon" onClick={() => changeDay(1)} title="Jour suivant"><Icon name="chevron-right" size={16} /></button>
        </div>
      </div>

      <div className="scroll-content" style={{ padding: '0 28px 28px' }}>
        {/* Top: Tournées optimizer card */}
        <div className="card" style={{ marginBottom: 16, overflow: 'hidden' }}>
          <div className="card-header">
            <div className="card-title">Tournées du jour</div>
            <span className="chip chip-neutral" style={{ marginLeft: 'auto' }}>{covered}/{visibleTournees.length} couvertes</span>
            <span className="chip chip-info">{dayPresents.length} présents</span>
          </div>

          {/* Filter bar + actions */}
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', background: 'var(--surface-2)' }}>
            <span className="label-sm" style={{ marginRight: 4 }}>Prestation</span>
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', flex: 1 }}>
              <button onClick={() => setCatFilter('all')}
                style={{ padding: '5px 11px', borderRadius: 7, border: `1px solid ${catFilter === 'all' ? 'var(--accent)' : 'var(--border)'}`,
                  background: catFilter === 'all' ? 'var(--accent)' : 'var(--surface)',
                  color: catFilter === 'all' ? '#fff' : 'var(--text-2)',
                  fontFamily: 'inherit', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: '.15s' }}>
                Toutes ({team.tournees.length})
              </button>
              {cats.map((c) => {
                const n = team.tournees.filter((t) => t.categoryId === c.id).length;
                return (
                  <button key={c.id} onClick={() => setCatFilter(c.id)}
                    style={{ padding: '5px 11px', borderRadius: 7, border: `1px solid ${catFilter === c.id ? c.color : c.color + '40'}`,
                      background: catFilter === c.id ? c.color : `${c.color}10`,
                      color: catFilter === c.id ? '#fff' : c.color,
                      fontFamily: 'inherit', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: '.15s', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: catFilter === c.id ? '#fff' : c.color }}/>
                    {c.name} ({n})
                  </button>);
              })}
              {noneCount > 0 &&
                <button onClick={() => setCatFilter('none')}
                  style={{ padding: '5px 11px', borderRadius: 7, border: `1px solid ${catFilter === 'none' ? 'var(--text-2)' : 'var(--border)'}`,
                    background: catFilter === 'none' ? 'var(--text-2)' : 'var(--surface)',
                    color: catFilter === 'none' ? '#fff' : 'var(--text-3)',

              <Icon name="zap" size={14} /> Optimiser
            </button>
          </div>

          {/* Tournées grid */}
          <div style={{ padding: '4px 0', maxHeight: 460, overflow: 'auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(340px,1fr))', gap: 0 }}>

                return (
                  <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 18px', borderBottom: '1px solid var(--border)', borderRight: '1px solid var(--border)' }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: cat?.color || 'var(--surface-3)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, flexShrink: 0, opacity: cat ? 1 : .6, fontVariantNumeric: 'tabular-nums' }}>
                      {tNum(t)}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }} className="truncate">{t.name}</div>
                      {cat && <div style={{ fontSize: 11, color: cat.color, marginTop: 1, fontWeight: 500 }}>{cat.name}</div>}
                    </div>
                    <select className="input" style={{ height: 34, fontSize: 12, padding: '0 28px 0 10px', minWidth: 130, maxWidth: 150, borderColor: ag ? ag.color : 'var(--border-strong)', color: ag ? ag.color : 'var(--text)', fontWeight: ag ? 600 : 400 }}
                      value={aId || ''} onChange={(e) => setAssign(t.id, e.target.value || null)}>

              <div className="empty-text">Cliquez sur "Optimiser" pour distribuer automatiquement les tournées, ou affectez manuellement via les menus déroulants.</div>

                    <th style={{ padding: '12px 18px', textAlign: 'right', fontWeight: 600, color: 'var(--text-2)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '.5px' }}>Total</th>

                                      style={{ padding: '4px 10px', borderRadius: 7, fontSize: 12, fontWeight: 700,
                                        background: isDouble ? 'var(--danger)' : c.color, color: '#fff', fontVariantNumeric: 'tabular-nums' }}>
                                      {tNum(t)}
                                    </span>
                                  ))}
                                </div>
                              }
                            </td>
                          );
                        })}
                        <td style={{ padding: '12px 18px', textAlign: 'right', fontWeight: 700, color: 'var(--text)', fontSize: 14 }}>{ts.length}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {idleAgents.length > 0 && (
            <div style={{ padding: '14px 18px', borderTop: '1px solid var(--border)', background: 'var(--surface-2)' }}>
              <div className="label-sm" style={{ marginBottom: 8 }}>Présents non affectés ({idleAgents.length})</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {idleAgents.map(a => (
                  <span key={a.id} className="chip" style={{ background: `${a.color}15`, color: a.color }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: a.color, marginRight: 4 }} />
                    {a.name}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══ LEAVES VIEW ════════════════════════════════════════════════════════════
function LeavesView({ team, user, leaveRequests, onRequestLeave, onReviewLeave }) {
  const [reviewReq, setReviewReq] = useState(null);
  const [showNewReq, setShowNewReq] = useState(false);
  const [filter, setFilter] = useState('pending');

  const teamReqs = leaveRequests.filter((r) => r.teamId === team.id);
  const visible = teamReqs.filter((r) => filter === 'all' || r.status === filter);
  const counts = {
    pending: teamReqs.filter((r) => r.status === 'pending').length,
    approved: teamReqs.filter((r) => r.status === 'approved').length,
    refused: teamReqs.filter((r) => r.status === 'refused').length,
    cancelled: teamReqs.filter((r) => r.status === 'cancelled').length
  };

  return (
    <div className="main">
      <div style={{ padding: '24px 28px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div>
          <div className="h2">Congés</div>
          <div className="caption" style={{ marginTop: 2 }}>Demandes en cours et historique</div>
        </div>
        <button className="btn btn-primary" style={{ marginLeft: 'auto' }} onClick={() => setShowNewReq(true)}>
          <Icon name="plus" size={14} /> Nouvelle demande
        </button>
      </div>
      <div style={{ padding: '0 28px 14px' }}>
        <div className="segmented">
          {[['pending', `En attente (${counts.pending})`], ['approved', `Approuvés (${counts.approved})`], ['refused', `Refusés (${counts.refused})`], ['cancelled', `Annulés (${counts.cancelled})`], ['all', 'Tous']].map(([k, l]) =>
          <button key={k} className={filter === k ? 'active' : ''} onClick={() => setFilter(k)}>{l}</button>
          )}
        </div>
      </div>
      <div className="scroll-content" style={{ padding: '0 28px 28px' }}>
        {visible.length === 0 ?
        <div className="empty">
            <div className="empty-icon">🌴</div>
            <div className="empty-title">Aucune demande</div>
            <div className="empty-text">{filter === 'pending' ? 'Aucune demande en attente de validation.' : 'Rien à afficher dans cette catégorie.'}</div>
          </div> :

        <div className="card" style={{ maxWidth: 740 }}>
            {visible.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map((req) => {
            const agent = team.agents.find((a) => a.id === (req.agentId || req.userId));
            const lt = LEAVE_MAP[req.type] || { label: req.type, color: '#999' };
            const days = Math.round((parseD(req.dateTo) - parseD(req.dateFrom)) / 86400000) + 1;
            const statusChipClass = req.status === 'approved' ? 'chip-success' : req.status === 'refused' ? 'chip-danger' : req.status === 'cancelled' ? 'chip-neutral' : 'chip-warning';
            const statusLabel = req.status === 'approved' ? 'Approuvé' : req.status === 'refused' ? 'Refusé' : req.status === 'cancelled' ? 'Annulé' : 'En attente';
            return (
              <div key={req.id} className="list-row clickable"
              onClick={() => setReviewReq(req)}>
                  <Avatar name={agent?.name || '?'} color={agent?.color || '#999'} size={40} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3, flexWrap: 'wrap' }}>
                      <span style={{ fontWeight: 600, fontSize: 14 }}>{agent?.name || 'Agent'}</span>
                      <span className="chip" style={{ background: `${lt.color}20`, color: lt.color }}>{lt.label}</span>
                    </div>
                    <div className="caption">
                      {parseD(req.dateFrom).toLocaleDateString('fr-FR')} → {parseD(req.dateTo).toLocaleDateString('fr-FR')} · <strong style={{ color: 'var(--accent)' }}>{days}j</strong>
                    </div>
                    {req.note && <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 4, fontStyle: 'italic' }}>"{req.note}"</div>}
                  </div>
                  <span className={`chip ${statusChipClass}`}>{statusLabel}</span>
                </div>);

          })}
          </div>
        }
      </div>
      {reviewReq && <ReviewLeaveModal req={reviewReq} agents={team.agents || []} onReview={(id, s, n) => {onReviewLeave(id, s, n);setReviewReq(null);}} onClose={() => setReviewReq(null)} />}
      {showNewReq && <LeaveRequestModal user={user} team={team} onSave={(req) => {onRequestLeave(req);setShowNewReq(false);}} onClose={() => setShowNewReq(false)} />}
    </div>);

}

// ═══ AGENTS VIEW ════════════════════════════════════════════════════════════
function AgentsView({ team, updateTeam, absMap, selDay }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  function updateAgent(id, fn) {updateTeam((t) => ({ ...t, agents: t.agents.map((a) => a.id === id ? fn(a) : a) }));}
  function addAgent() {
    const n = team.agents.length;
    updateTeam((t) => ({ ...t, agents: [...t.agents, { id: mkId(), name: `Agent ${n + 1}`, color: AGENT_COLORS[n % AGENT_COLORS.length], prefEnabled: false, preferred: [], managerial: false }] }));
  }
  function removeAgent(id) {if (confirm('Supprimer cet agent ?')) updateTeam((t) => ({ ...t, agents: t.agents.filter((a) => a.id !== id) }));}
  const q = search.trim().toLowerCase();
  const today = selDay || fmt(new Date());
  const todayLabel = parseD(today).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  let filteredAgents = q ? team.agents.filter(a => (a.name || '').toLowerCase().includes(q)) : team.agents;
  if (statusFilter === 'absent') filteredAgents = filteredAgents.filter(a => !!absMap[`${a.id}__${today}`]);
  if (statusFilter === 'present') filteredAgents = filteredAgents.filter(a => !absMap[`${a.id}__${today}`]);
  const absentCount = team.agents.filter(a => !!absMap[`${a.id}__${today}`]).length;
  return (
    <div className="main">
      <div style={{ padding: '24px 28px 16px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div>
          <div className="h2">Agents</div>
          <div className="caption" style={{ marginTop: 2 }}>
            {q
              ? `${filteredAgents.length} sur ${team.agents.length} agent${team.agents.length > 1 ? 's' : ''}`
              : `${team.agents.length} agent${team.agents.length > 1 ? 's' : ''} dans cette équipe`}
            {absentCount > 0 && <span style={{ marginLeft: 8, color: 'var(--danger)', fontWeight: 600 }}>· {absentCount} absent{absentCount > 1 ? 's' : ''} aujourd'hui</span>}
          </div>
        </div>
        <div style={{ position: 'relative', flex: 1, maxWidth: 320, marginLeft: 'auto' }}>
          <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-3)', display: 'flex', alignItems: 'center', pointerEvents: 'none' }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </div>
          <input className="input" placeholder="Rechercher un agent…" value={search}
            onChange={(e) => setSearch(e.target.value)}
            style={{ paddingLeft: 36, paddingRight: search ? 32 : 12 }} />
          {search &&
            <button onClick={() => setSearch('')}
              style={{ position: 'absolute', right: 6, top: '50%', transform: 'translateY(-50%)', background: 'var(--surface-2)', border: 'none', borderRadius: '50%', width: 22, height: 22, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-2)' }}>
              <Icon name="x" size={12} />
            </button>
          }
        </div>
        <button className="btn btn-primary" onClick={addAgent}>
          <Icon name="plus" size={14} /> Ajouter
        </button>
      </div>
      <div style={{ padding: '0 28px 14px', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
        <div className="segmented">
          {[['all', `Tous (${team.agents.length})`], ['present', `Présents (${team.agents.length - absentCount})`], ['absent', `Absents (${absentCount})`]].map(([k, l]) =>
            <button key={k} className={statusFilter === k ? 'active' : ''} onClick={() => setStatusFilter(k)}>{l}</button>
          )}
        </div>
        <div className="caption" style={{ textTransform: 'capitalize' }}>État au {todayLabel}</div>
      </div>
      <div className="scroll-content" style={{ padding: '0 28px 28px' }}>
        {filteredAgents.length === 0 ?
          <div className="empty">
            <div className="empty-icon">{statusFilter === 'absent' ? '✅' : '🔍'}</div>
            <div className="empty-title">{statusFilter === 'absent' ? 'Aucun absent' : 'Aucun agent trouvé'}</div>
            <div className="empty-text">{statusFilter === 'absent' ? 'Tous les agents sont présents aujourd\'hui.' : q ? `Aucun agent ne correspond à « ${search} ».` : 'Ajoutez un agent pour commencer.'}</div>
          </div> :

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 12 }}>
            {filteredAgents.map((agent) => {
              const abs = absMap[`${agent.id}__${today}`];
              const at = abs ? ABS_MAP[abs.type] : null;
              return <AgentCardWrap key={agent.id} agent={agent} abs={abs} at={at} updateAgent={updateAgent} removeAgent={removeAgent} team={team} />;
            })}
          </div>
        }
      </div>
    </div>);
}
