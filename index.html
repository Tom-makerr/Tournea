  return (
    <div className="card card-hover card-padded" style={{ position: 'relative', borderColor: abs ? `${at.color}55` : undefined, boxShadow: abs ? `0 0 0 1.5px ${at.color}30, var(--shadow)` : undefined, overflow: 'hidden' }}>
      {abs && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          padding: '6px 14px',
          background: `linear-gradient(90deg, ${at.color}22 0%, ${at.color}11 100%)`,
          borderBottom: `1px solid ${at.color}40`,
          fontSize: 11, fontWeight: 700, color: at.color, letterSpacing: '.3px',
          display: 'flex', alignItems: 'center', gap: 6
        }}>
          <span style={{ width: 7, height: 7, borderRadius: '50%', background: at.color, boxShadow: `0 0 0 2px ${at.color}33` }} />
          ABSENT · {at.label.toUpperCase()}
          <span style={{ marginLeft: 'auto', fontSize: 10, opacity: .7, fontWeight: 500 }}>
            {parseD(abs.dateFrom).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })}
            {abs.dateFrom !== abs.dateTo ? ` → ${parseD(abs.dateTo).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })}` : ''}
          </span>
        </div>
      )}
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 14, marginTop: abs ? 22 : 0 }}>
        <div style={{ position: 'relative', flexShrink: 0 }}>
          <Avatar name={agent.name} color={agent.color} size={44} />
          {abs && <span style={{ position: 'absolute', bottom: -2, right: -2, width: 16, height: 16, borderRadius: '50%', background: at.color, border: '2.5px solid var(--surface)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
          </span>}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <input value={agent.name} onChange={(e) => updateAgent(agent.id, (a) => ({ ...a, name: e.target.value }))}
            style={{ background: 'transparent', border: 'none', padding: 0, fontSize: 15, fontWeight: 600, color: 'var(--text)', width: '100%', outline: 'none', borderBottom: '1.5px solid transparent', transition: '.15s' }}
            onFocus={(e) => e.target.style.borderBottomColor = 'var(--accent)'}
            onBlur={(e) => e.target.style.borderBottomColor = 'transparent'} />
          <div className="caption" style={{ marginTop: 2 }}>
            {abs ? <span style={{ color: at.color, fontWeight: 600 }}>Non affectable aujourd'hui</span> : 'Agent de distribution'}
          </div>
        </div>
        <button onClick={() => removeAgent(agent.id)} className="btn btn-ghost btn-icon btn-sm" style={{ color: 'var(--text-3)' }}><Icon name="trash" size={14} /></button>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingTop: 12, borderTop: '1px solid var(--border)' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>Tournées préférentielles</div>
          <div className="caption" style={{ marginTop: 1 }}>{agent.prefEnabled ? `${(agent.preferred || []).length} sélectionnée${(agent.preferred || []).length > 1 ? 's' : ''}` : 'Toutes autorisées'}</div>
        </div>
        <div className={`toggle${agent.prefEnabled ? ' on' : ''}`} onClick={() => updateAgent(agent.id, (a) => ({ ...a, prefEnabled: !a.prefEnabled }))} />
      </div>
      {agent.prefEnabled &&
        <div style={{ marginTop: 10 }}>
          {team.tournees.length === 0 && <div className="caption">Aucune tournée — créez-en dans la rubrique Tournées</div>}
          {team.tournees.length > 0 &&
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, maxHeight: 130, overflowY: 'auto', paddingRight: 4 }}>
              {team.tournees.map((t) => {
                const on = (agent.preferred || []).includes(t.id);
                const cat = (team.categories || []).find((c) => c.id === t.categoryId);
                return (
                  <button key={t.id}
                    onClick={() => updateAgent(agent.id, (a) => ({ ...a, preferred: on ? a.preferred.filter((x) => x !== t.id) : [...(a.preferred || []), t.id] }))}
                    title={cat ? `${t.name} · ${cat.name}` : t.name}
                    style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '4px 8px', borderRadius: 7, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer',
                      background: on ? cat?.color || 'var(--accent)' : 'var(--surface)',
                      borderColor: on ? cat?.color || 'var(--accent)' : 'var(--border)',
                      color: on ? '#fff' : cat?.color || 'var(--text-2)',
                      transition: '.15s', fontFamily: 'inherit' }}>
                    <span style={{ fontVariantNumeric: 'tabular-nums' }}>{tNum(t)}</span>
                    {(() => {
                      const cleaned = (t.name || '').replace(/^\s*(tournée|tournee)?\s*\d+\s*[-–:.]?\s*/i, '').trim();
                      if (!cleaned || cleaned === tNum(t)) return null;
                      return <span className="truncate" style={{ maxWidth: 110 }}>{cleaned}</span>;
                    })()}
                  </button>);
              })}
            </div>
          }
          {(agent.preferred || []).length > 0 &&
            <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
              <button onClick={() => updateAgent(agent.id, (a) => ({ ...a, preferred: team.tournees.map((t) => t.id) }))}
                style={{ padding: '3px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text-2)', fontSize: 11, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer' }}>
                Tout sélectionner
              </button>
              <button onClick={() => updateAgent(agent.id, (a) => ({ ...a, preferred: [] }))}
                style={{ padding: '3px 8px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text-2)', fontSize: 11, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer' }}>
                Vider
              </button>
              {(team.categories || []).map((c) =>
                <button key={c.id}
                  onClick={() => {
                    const catTs = team.tournees.filter((t) => t.categoryId === c.id).map((t) => t.id);
                    updateAgent(agent.id, (a) => {
                      const set = new Set(a.preferred || []);
                      catTs.forEach((id) => set.add(id));
                      return { ...a, preferred: [...set] };
                    });
                  }}
                  style={{ padding: '3px 8px', borderRadius: 6, border: `1px solid ${c.color}40`, background: `${c.color}10`, color: c.color, fontSize: 11, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer' }}>
                  + {c.name}
                </button>
              )}
            </div>
          }
        </div>
      }
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingTop: 12, marginTop: 12, borderTop: '1px solid var(--border)' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>Rôle managérial</div>
          <div className="caption" style={{ marginTop: 1 }}>{agent.managerial ? 'Reste au bureau' : 'En tournée'}</div>
        </div>
        <div className={`toggle${agent.managerial ? ' on' : ''}`} onClick={() => updateAgent(agent.id, (a) => ({ ...a, managerial: !a.managerial }))} />
      </div>
    </div>
  );
}

// ═══ TOURNEES VIEW ══════════════════════════════════════════════════════════
function TourneesView({ team, updateTeam }) {
  const [catModal, setCatModal] = useState(null);
  const [filter, setFilter] = useState(null);

  function updateTournee(id, fn) {updateTeam((t) => ({ ...t, tournees: t.tournees.map((tt) => tt.id === id ? fn(tt) : tt) }));}
  function addTournee() {updateTeam((t) => {const n = t.tournees.length + 1;return { ...t, tournees: [...t.tournees, { id: mkId(), name: `Tournée ${String(n).padStart(2, '0')}`, color: T_COLORS[n % T_COLORS.length], num: n, categoryId: filter }] };});}
  function removeTournee(id) {if (confirm('Supprimer cette tournée ?')) updateTeam((t) => ({ ...t, tournees: t.tournees.filter((tt) => tt.id !== id) }));}
  function saveCategory(cat) {updateTeam((t) => {const cats = t.categories || [];const exists = cats.find((c) => c.id === cat.id);return { ...t, categories: exists ? cats.map((c) => c.id === cat.id ? cat : c) : [...cats, cat] };});setCatModal(null);}
  function removeCat(id) {if (!confirm('Supprimer cette catégorie ?')) return;updateTeam((t) => ({ ...t, categories: (t.categories || []).filter((c) => c.id !== id), tournees: t.tournees.map((tt) => tt.categoryId === id ? { ...tt, categoryId: null } : tt) }));}

  const visible = filter ? team.tournees.filter((t) => t.categoryId === filter) : team.tournees;

  return (
    <div className="main">
      <div style={{ padding: '24px 28px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div>
          <div className="h2">Tournées</div>
          <div className="caption" style={{ marginTop: 2 }}>{team.tournees.length} tournées · {(team.categories || []).length} catégorie{(team.categories || []).length > 1 ? 's' : ''}</div>
        </div>
        <button className="btn btn-secondary" onClick={() => setCatModal({ cat: null })} style={{ marginLeft: 'auto' }}>
          <Icon name="plus" size={14} /> Catégorie
        </button>
        <button className="btn btn-primary" onClick={addTournee}>
          <Icon name="plus" size={14} /> Tournée
        </button>
      </div>

      {/* Category filter */}
      <div style={{ padding: '0 28px 14px', display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <button className={`btn btn-sm${!filter ? ' btn-primary' : ' btn-secondary'}`} onClick={() => setFilter(null)}>Toutes ({team.tournees.length})</button>
        {(team.categories || []).map((c) =>
        <div key={c.id} style={{ display: 'inline-flex', alignItems: 'center', height: 28, borderRadius: 7, overflow: 'hidden', background: filter === c.id ? c.color : 'var(--surface-2)', border: '1px solid var(--border)' }}>
            <button style={{ height: 28, padding: '0 10px', background: 'transparent', border: 'none', cursor: 'pointer', color: filter === c.id ? '#fff' : c.color, fontSize: 12, fontWeight: 600, fontFamily: 'inherit' }}
          onClick={() => setFilter(filter === c.id ? null : c.id)}>{c.name} ({team.tournees.filter((t) => t.categoryId === c.id).length})</button>
            <button style={{ height: 28, padding: '0 7px', background: 'transparent', border: 'none', cursor: 'pointer', color: filter === c.id ? '#fff' : 'var(--text-2)', fontSize: 12, fontFamily: 'inherit' }}
          onClick={() => setCatModal({ cat: c })}><Icon name="edit" size={12} /></button>
            <button style={{ height: 28, padding: '0 7px', background: 'transparent', border: 'none', cursor: 'pointer', color: filter === c.id ? '#fff' : 'var(--text-2)', fontSize: 12, fontFamily: 'inherit' }}
          onClick={() => removeCat(c.id)}><Icon name="x" size={12} /></button>
          </div>
        )}
      </div>

      <div className="scroll-content" style={{ padding: '0 28px 28px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(240px,1fr))', gap: 10 }}>
          {visible.map((t) => {
            const cat = (team.categories || []).find((c) => c.id === t.categoryId);
            return (
              <div key={t.id} className="card card-hover" style={{ padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
                <input value={t.code || ''}
                placeholder={String(t.num).padStart(2, '0')}
                onChange={(e) => updateTournee(t.id, (tt) => ({ ...tt, code: e.target.value }))}
                title="Numéro de tournée (modifiable)"
                style={{ width: 56, height: 36, borderRadius: 9, background: cat?.color || 'var(--surface-3)', color: '#fff', textAlign: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0, opacity: cat ? 1 : .6, border: 'none', outline: 'none', fontFamily: 'inherit', padding: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <input value={t.name} onChange={(e) => updateTournee(t.id, (tt) => ({ ...tt, name: e.target.value }))}
                  style={{ background: 'transparent', border: 'none', padding: 0, fontSize: 13, fontWeight: 500, color: 'var(--text)', width: '100%', outline: 'none', borderBottom: '1.5px solid transparent', transition: '.15s' }}
                  onFocus={(e) => e.target.style.borderBottomColor = 'var(--accent)'}
                  onBlur={(e) => e.target.style.borderBottomColor = 'transparent'} />
                  <select value={t.categoryId || ''} onChange={(e) => updateTournee(t.id, (tt) => ({ ...tt, categoryId: e.target.value || null }))}
                  style={{ background: 'transparent', border: 'none', padding: 0, fontSize: 11, color: cat ? cat.color : 'var(--text-3)', cursor: 'pointer', marginTop: 2, outline: 'none', fontFamily: 'inherit' }}>
                    <option value="">Sans catégorie</option>
                    {(team.categories || []).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <button onClick={() => removeTournee(t.id)} className="btn btn-ghost btn-icon btn-sm" style={{ color: 'var(--text-3)' }}><Icon name="trash" size={14} /></button>
              </div>);

          })}
        </div>
      </div>
      {catModal && <CategoryModal category={catModal.cat} onSave={saveCategory} onClose={() => setCatModal(null)} />}
    </div>);

}

// ═══ DASHBOARD VIEW ══════════════════════════════════════════════════════════
function DashboardView({ team, absMap, leaveRequests, year, month, assignments, setYear, setMonth, selDay, setSelDay }) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const agents = team.agents || [];
  const absByType = {};
  ABSENCE_TYPES.forEach((t) => {absByType[t.code] = 0;});
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    agents.forEach((a) => {const abs = absMap[`${a.id}__${ds}`];if (abs) absByType[abs.type] = (absByType[abs.type] || 0) + 1;});
  }
  const agentAbsCount = agents.map((a) => {
    let n = 0;
    for (let d = 1; d <= daysInMonth; d++) {const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;if (absMap[`${a.id}__${ds}`]) n++;}
    return { agent: a, count: n };
  }).sort((a, b) => b.count - a.count);
  let totalCovered = 0,totalPossible = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const dow = new Date(year, month, d).getDay();
    if (dow === 0 || dow === 6) continue;
    totalPossible++;
    const da = assignments[`${team.id}__${ds}`] || {};
    if (Object.values(da).some(Boolean)) totalCovered++;
  }
  const pendingLeaves = leaveRequests.filter((r) => r.teamId === team.id && r.status === 'pending').length;
  const totalAbs = Object.values(absByType).reduce((a, b) => a + b, 0);
  const workDays = Array.from({ length: daysInMonth }, (_, i) => {const d = new Date(year, month, i + 1);return d.getDay() !== 0 && d.getDay() !== 6;}).filter(Boolean).length;
  const presRate = agents.length && workDays ? Math.round(100 - totalAbs / (agents.length * workDays) * 100) : 100;
  const covRate = totalPossible ? Math.round(totalCovered / totalPossible * 100) : 0;

  function prevMonth() {if (month === 0) {setMonth(11);setYear((y) => y - 1);} else setMonth((m) => m - 1);}
  function nextMonth() {if (month === 11) {setMonth(0);setYear((y) => y + 1);} else setMonth((m) => m + 1);}

  return (
    <div className="main">
      <div style={{ padding: '24px 28px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div>
          <div className="h2">Tableau de bord</div>
          <div className="caption" style={{ marginTop: 2 }}>{FR_MONTHS[month]} {year}</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
          <button className="btn btn-secondary btn-icon" onClick={prevMonth}><Icon name="chevron-left" size={16} /></button>
          <button className="btn btn-secondary btn-icon" onClick={nextMonth}><Icon name="chevron-right" size={16} /></button>
        </div>
      </div>
      <div className="scroll-content" style={{ padding: '0 28px 28px' }}>
        {/* Affectations du jour */}
        {(() => {
          const dayKey = `${team.id}__${selDay}`;
          const dayAssign = assignments[dayKey] || {};
          const cats = team.categories || [];
          const presentAgents = (team.agents || []).filter((a) => !absMap[`${a.id}__${selDay}`]);
          const absent = (team.agents || []).filter((a) => !!absMap[`${a.id}__${selDay}`]);
          // Build map: agentId → { categoryId → [tournée] }
          const agentMap = {};
          Object.entries(dayAssign).forEach(([tId, aId]) => {
            if (!aId) return;
            const t = team.tournees.find((x) => x.id === tId);
            if (!t) return;
            const cat = t.categoryId || '__none';
            agentMap[aId] = agentMap[aId] || {};
            (agentMap[aId][cat] = agentMap[aId][cat] || []).push(t);
          });
          const assignedAgentIds = Object.keys(agentMap);
          const totalAssigned = Object.values(dayAssign).filter(Boolean).length;
          const selLabel = parseD(selDay).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
          // Detect doublons
          const violations = new Set();
          Object.entries(agentMap).forEach(([aId, catMap]) => {
            Object.values(catMap).forEach((arr) => {if (arr.length > 1) violations.add(aId);});
          });
          // Column headers: categories with assigned tournées + "Sans prestation"
          const usedCatIds = new Set();
          Object.values(agentMap).forEach((catMap) => Object.keys(catMap).forEach((c) => usedCatIds.add(c)));
          const columns = [...cats.filter((c) => usedCatIds.has(c.id)), ...(usedCatIds.has('__none') ? [{ id: '__none', name: 'Sans prestation', color: '#8E8E93' }] : [])];

          return (
            <div className="card" style={{ marginBottom: 16, overflow: 'hidden' }}>
              <div className="card-header">
                <div>
                  <div className="card-title">Affectations du jour</div>
                  <div className="caption" style={{ marginTop: 2, textTransform: 'capitalize' }}>{selLabel}</div>
                </div>
                <input type="date" className="input" style={{ height: 32, marginLeft: 'auto', width: 160, fontSize: 13 }}
                value={selDay} onChange={(e) => setSelDay(e.target.value)} />
                <span className="chip chip-info">{totalAssigned}/{team.tournees.length} tournées</span>
              </div>
              {assignedAgentIds.length === 0 ?
              <div className="empty" style={{ padding: '30px 20px' }}>
                  <div className="empty-icon">📋</div>
                  <div className="empty-title">Aucune affectation</div>
                  <div className="empty-text">Aucune tournée n'a encore été assignée pour ce jour.</div>
                </div> :

              <div style={{ overflow: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: 'var(--surface-2)' }}>
                        <th style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, color: 'var(--text-2)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '.5px', position: 'sticky', left: 0, background: 'var(--surface-2)', zIndex: 1, minWidth: 160 }}>Agent</th>
                        {columns.map((c) =>
                      <th key={c.id} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, fontSize: 11, textTransform: 'uppercase', letterSpacing: '.5px', color: c.color, minWidth: 120 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                              <div style={{ width: 8, height: 8, borderRadius: '50%', background: c.color }} />
                              {c.name}
                            </div>
                          </th>
                      )}
                        <th style={{ padding: '10px 14px', textAlign: 'right', fontWeight: 600, color: 'var(--text-2)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '.5px' }}>Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      {presentAgents.map((a) => {
                      const catMap = agentMap[a.id] || {};
                      const total = Object.values(catMap).reduce((s, arr) => s + arr.length, 0);
                      const hasViolation = violations.has(a.id);
                      if (total === 0) return null;
                      return (
                        <tr key={a.id} style={{ borderTop: '1px solid var(--border)', background: hasViolation ? 'rgba(255,59,48,0.04)' : 'transparent' }}>
                            <td style={{ padding: '10px 14px', position: 'sticky', left: 0, background: hasViolation ? 'rgba(255,59,48,0.04)' : 'var(--surface)', zIndex: 1 }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                                <Avatar name={a.name} color={a.color} size={28} />
                                <div>
                                  <div style={{ fontWeight: 600, fontSize: 13 }}>{a.name}</div>
                                  {hasViolation && <div style={{ fontSize: 10, color: 'var(--danger)', fontWeight: 600, marginTop: 1 }}>⚠ Doublon prestation</div>}
                                </div>
                              </div>
                            </td>
                            {columns.map((c) => {
                            const ts = catMap[c.id] || [];
                            const isDouble = ts.length > 1;
                            return (
                              <td key={c.id} style={{ padding: '10px 14px' }}>
                                  {ts.length === 0 ? <span style={{ color: 'var(--text-3)' }}>—</span> :
                                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                                      {ts.map((t) =>
                                  <span key={t.id} title={t.name}
                                  style={{ padding: '3px 8px', borderRadius: 6, fontSize: 11, fontWeight: 700,
                                    background: isDouble ? `var(--danger)` : c.color, color: '#fff', fontVariantNumeric: 'tabular-nums' }}>
                                          {tNum(t)}
                                        </span>
                                  )}
                                    </div>
                                }
                                </td>);

                          })}
                            <td style={{ padding: '10px 14px', textAlign: 'right', fontWeight: 600, color: 'var(--text-2)', fontSize: 13 }}>{total}</td>
                          </tr>);

                    })}
                    </tbody>
                  </table>
                </div>
              }
              {(presentAgents.filter((a) => !agentMap[a.id]).length > 0 || absent.length > 0) &&
              <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border)', background: 'var(--surface-2)', display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12 }}>
                  {presentAgents.filter((a) => !agentMap[a.id]).length > 0 &&
                <div style={{ flex: 1, minWidth: 200 }}>
                      <div className="label-sm" style={{ marginBottom: 5 }}>Présents non affectés</div>
                      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                        {presentAgents.filter((a) => !agentMap[a.id]).map((a) =>
                    <span key={a.id} className="chip" style={{ background: `${a.color}15`, color: a.color }}>{a.name}</span>
                    )}
                      </div>
                    </div>
                }
                  {absent.length > 0 &&
                <div style={{ flex: 1, minWidth: 200 }}>
                      <div className="label-sm" style={{ marginBottom: 5 }}>Absents</div>
                      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                        {absent.map((a) => {
                      const abs = absMap[`${a.id}__${selDay}`];
                      const at = ABS_MAP[abs.type];
                      return (
                        <span key={a.id} className="chip" style={{ background: `${at.color}15`, color: at.color }}>
                              {a.name} · {abs.type}
                            </span>);

                    })}
                      </div>
                    </div>
                }
                </div>
              }
            </div>);

        })()}

        {/* KPI grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 12, marginBottom: 16 }}>
          {[
          { label: 'Taux de présence', val: `${presRate}%`, sub: 'sur jours ouvrés', color: 'var(--success)' },
          { label: 'Absences totales', val: totalAbs, sub: 'jours · mois', color: 'var(--warning)' },
          { label: 'Congés en attente', val: pendingLeaves, sub: 'à valider', color: 'var(--accent)' },
          { label: 'Tournées couvertes', val: `${covRate}%`, sub: `${totalCovered}/${totalPossible} jours`, color: 'var(--text)' }].
          map((k) =>
          <div key={k.label} className="card card-padded">
              <div className="caption" style={{ fontWeight: 500 }}>{k.label}</div>
              <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.02em', color: k.color, margin: '8px 0 4px' }}>{k.val}</div>
              <div className="caption" style={{ fontSize: 11 }}>{k.sub}</div>
            </div>
          )}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {/* By type */}
          <div className="card card-padded">
            <div className="h4" style={{ marginBottom: 14 }}>Absences par type</div>
            {ABSENCE_TYPES.filter((t) => absByType[t.code] > 0).sort((a, b) => absByType[b.code] - absByType[a.code]).map((t) => {
              const n = absByType[t.code];
              const max = Math.max(...Object.values(absByType)) || 1;
              return (
                <div key={t.code} style={{ marginBottom: 10 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5, fontSize: 13 }}>
                    <span style={{ fontWeight: 500, color: t.color }}>{t.label}</span>
                    <span style={{ color: 'var(--text-2)', fontWeight: 500 }}>{n}j</span>
                  </div>
                  <div className="progress"><div className="progress-fill" style={{ width: `${n / max * 100}%`, background: t.color }} /></div>
                </div>);

            })}
            {totalAbs === 0 && <div className="caption">Aucune absence ce mois</div>}
          </div>
          {/* By agent */}
          <div className="card card-padded">
            <div className="h4" style={{ marginBottom: 14 }}>Absences par agent</div>
            {agentAbsCount.filter((x) => x.count > 0).slice(0, 8).map(({ agent, count }) =>
            <div key={agent.id} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                <Avatar name={agent.name} color={agent.color} size={28} />
                <span className="truncate" style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{agent.name}</span>
                <div className="progress" style={{ flex: 1.5, maxWidth: 130 }}><div className="progress-fill" style={{ width: `${Math.min(100, count / workDays * 100)}%`, background: agent.color }} /></div>
                <span style={{ fontSize: 12, color: 'var(--text-2)', fontWeight: 500, minWidth: 24, textAlign: 'right' }}>{count}j</span>
              </div>
            )}
            {agentAbsCount.every((x) => x.count === 0) && <div className="caption">Tous les agents présents</div>}
          </div>
        </div>
      </div>
    </div>);

}

        </Section>

        {/* Team */}

              <div style={{ display: 'flex', gap: 8 }}>
                <div style={{ flex: 1, height: 42, background: 'var(--surface-2)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 18, letterSpacing: 6, color: 'var(--accent)' }}>{team.code}</div>
                <button className="btn btn-tinted" style={{ height: 42 }} onClick={copyCode}><Icon name="copy" size={14} />{copied ? 'Copié' : 'Copier'}</button>
                <button className="btn btn-tinted" style={{ height: 42 }} onClick={onJoinTeam}>Rejoindre</button>
              </div>
              <div className="caption" style={{ marginTop: 8 }}>Partagez ce code avec vos agents, ou rejoignez une équipe existante.</div>
            </div>
            <Row label="Créer une nouvelle équipe" sub="Vous pouvez gérer plusieurs équipes" border={false} right={
          <button className="btn btn-secondary btn-sm" onClick={onCreateTeam}><Icon name="plus" size={12} /> Créer</button>
          } />
          </Section>
        }

        {/* Data */}
        <Section title="Données">
          <Row label="Import Excel" sub="Importer agents et tournées depuis un fichier" right={
          <button className="btn btn-tinted btn-sm" onClick={onImport}><Icon name="upload" size={12} /> Importer</button>
          } />
          <Row label="Réinitialiser l'application" sub="Effacer toutes les données locales" border={false} right={
          <button className="btn btn-danger-tinted btn-sm" onClick={() => {if (confirm('Effacer toutes les données ? Cette action est irréversible.')) {localStorage.clear();window.location.reload();}}}>Réinitialiser</button>
          } />
        </Section>

        <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--text-3)', padding: '14px 0' }}>
          La Poste RH · v4 · 2026
        </div>
      </div>

      {showTeamSettings &&
      <TeamSettingsModal team={team}
      canDelete={canDeleteTeam}
      onDelete={() => {onDeleteTeam(team.id);setShowTeamSettings(false);}}
      onSave={({ name, color, targetPresence }) => {updateTeam((t) => ({ ...t, name, color, targetPresence }));setShowTeamSettings(false);}}
      onClose={() => setShowTeamSettings(false)} />
      }
    </div>);

}

// ═══ TWEAKS ═════════════════════════════════════════════════════════
const LP_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "corners": "soft",
  "card": "elevated",
  "calendar": "cozy"
}/*EDITMODE-END*/;

function LPTweaks(){
  const [t,setTweak]=useTweaks(LP_TWEAK_DEFAULTS);
  useEffect(()=>{
    const h=document.documentElement;
    h.setAttribute('data-tweak-corners',t.corners);
    h.setAttribute('data-tweak-card',t.card);
    h.setAttribute('data-tweak-cal',t.calendar);
  },[t.corners,t.card,t.calendar]);
  return(
    <TweaksPanel title="Tweaks">
      <TweakSection label="Personnalité"/>
      <TweakRadio label="Coins" options={['sharp','soft','pill']} value={t.corners} onChange={v=>setTweak('corners',v)}/>
      <TweakRadio label="Cartes" options={['clean','elevated','outlined']} value={t.card} onChange={v=>setTweak('card',v)}/>
      <TweakRadio label="Calendrier" options={['dense','standard','cozy']} value={t.calendar} onChange={v=>setTweak('calendar',v)}/>
    </TweaksPanel>
  );
}

// ═══ APP ═══════════════════════════════════════════════════════════════════
function App() {
  // Default state
  const DEFAULT_USER = { id: 'me', name: 'Marie Dupont', email: 'marie.dupont@laposte.fr' };
  const initialAuth = load('lp4_auth', null);
  const [user, setUser] = useState(() => load('lp4_user', initialAuth || DEFAULT_USER));
  const [authUser, setAuthUser] = useState(initialAuth);
  const [loginName, setLoginName] = useState(authUser?.name || '');
  const [loginEmail, setLoginEmail] = useState(authUser?.email || '');
  const [loginError, setLoginError] = useState('');
  const [teams, setTeams] = useState(() => load('lp4_teams', []));
  const [absences, setAbsences] = useState(() => load('lp4_abs', {}));
  const [assignments, setAssignments] = useState(() => load('lp4_assign', {}));
  const [leaveRequests, setLeaveRequests] = useState(() => load('lp4_leaves', []));
  const [theme, setTheme] = useState(() => localStorage.getItem('lp4_theme') || 'light');
  const [accentColor, setAccentColor] = useState(() => localStorage.getItem('lp4_accent') || '#007AFF');
  const [liquidGlass, setLiquidGlass] = useState(() => localStorage.getItem('lp4_liquidGlass') === 'on');
  const [curTeamId, setCurTeamId] = useState(() => load('lp4_curTeam', null));
  const [tab, setTab] = useState('planning');
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selDay, setSelDay] = useState(fmt(now));
  const [absModal, setAbsModal] = useState(null);
  const [createTeamModal, setCreateTeamModal] = useState(false);
  const [importModal, setImportModal] = useState(false);
  const [showJoinModal, setShowJoinModal] = useState(false);

  // Persist
  useEffect(() => {document.documentElement.setAttribute('data-theme', theme);localStorage.setItem('lp4_theme', theme);}, [theme]);
  useEffect(() => {document.documentElement.setAttribute('data-liquid-glass', liquidGlass ? 'on' : 'off');localStorage.setItem('lp4_liquidGlass', liquidGlass ? 'on' : 'off');}, [liquidGlass]);
  useEffect(() => {document.documentElement.style.setProperty('--accent', accentColor);
    // also update soft accent
    const hex = accentColor.replace('#', '');
    document.documentElement.style.setProperty('--accent-soft', `${accentColor}15`);
    localStorage.setItem('lp4_accent', accentColor);}, [accentColor]);
  useEffect(() => {save('lp4_user', user);}, [user]);
  useEffect(() => {save('lp4_auth', authUser);}, [authUser]);
  useEffect(() => {save('lp4_teams', teams);}, [teams]);
  useEffect(() => {save('lp4_abs', absences);}, [absences]);
  useEffect(() => {save('lp4_assign', assignments);}, [assignments]);
  useEffect(() => {save('lp4_leaves', leaveRequests);}, [leaveRequests]);
  useEffect(() => {if (curTeamId) save('lp4_curTeam', curTeamId);}, [curTeamId]);

  // Auto-create default team if none
  useEffect(() => {
    if (teams.length === 0) {
      const agents = Array.from({ length: 8 }, (_, i) => ({ id: mkId(), name: `Agent ${i + 1}`, color: AGENT_COLORS[i % AGENT_COLORS.length], prefEnabled: false, preferred: [], managerial: false }));
      const tournees = Array.from({ length: 20 }, (_, i) => ({ id: mkId(), name: `Tournée ${String(i + 1).padStart(2, '0')}`, color: T_COLORS[i % T_COLORS.length], num: i + 1, categoryId: null }));
      const categories = [{ id: mkId(), name: 'Remises', color: CAT_COLORS[0] }, { id: mkId(), name: 'Collectes', color: CAT_COLORS[1] }];
      const t = { id: mkId(), name: 'Mon équipe', color: accentColor, code: generateCode(), targetPresence: 6, agents, tournees, categories };
      setTeams([t]);setCurTeamId(t.id);
    }
  }, []);

  const team = useMemo(() => teams.find((t) => t.id === curTeamId) || teams[0], [teams, curTeamId]);
  useEffect(() => {if (!curTeamId && teams[0]) setCurTeamId(teams[0].id);}, [curTeamId, teams]);

  const absMap = useMemo(() => {
    const m = {};(absences[team?.id] || []).forEach((a) => {m[`${a.agentId}__${a.date}`] = a;});
    return m;
  }, [absences, team]);
  const holidays = useMemo(() => getFrHolidays(year), [year]);
  const pendingCount = useMemo(() => leaveRequests.filter((r) => r.teamId === team?.id && r.status === 'pending').length, [leaveRequests, team]);

  function updateTeam(fn) {if (team) setTeams((prev) => prev.map((t) => t.id === team.id ? fn(t) : t));}
  function createTeam(t) {setTeams((prev) => [...prev, t]);setCurTeamId(t.id);setCreateTeamModal(false);}
  function deleteTeam(id) {if (teams.length <= 1) return;setTeams((prev) => {const n = prev.filter((t) => t.id !== id);if (curTeamId === id) setCurTeamId(n[0].id);return n;});}

  function joinTeam(code) {
    const normalized = String(code || '').trim().toUpperCase();
    if (!normalized) {alert('Veuillez saisir un code d\'invitation.');return;}
    const found = teams.find(t => t.code === normalized);
    if (!found) {alert('Code d\'invitation invalide ou équipe introuvable.');return;}
    if (found.id === team?.id) {alert('Vous êtes déjà dans cette équipe.');setCurTeamId(found.id);return;}
    const already = (found.agents || []).some(a => a.userId === user.id || a.email === user.email || a.name === user.name);
    if (already) {alert('Vous êtes déjà membre de cette équipe.');setCurTeamId(found.id);return;}
    const newAgent = {
      id: mkId(),
      userId: user.id,
      email: user.email,
      name: user.name || 'Nouveau membre',
      color: AGENT_COLORS[(found.agents || []).length % AGENT_COLORS.length],
      prefEnabled: false,
      preferred: [],
      managerial: false
    };
    setTeams((prev) => prev.map(t => t.id === found.id ? {...t, agents: [...t.agents, newAgent]} : t));
    setCurTeamId(found.id);
    setShowJoinModal(false);
    alert(`Vous avez rejoint l'équipe ${found.name}.`);
  }

  function saveAbsence(agentId, dates, type, dateFrom, dateTo) {
    if (!team) return;
    setAbsences((prev) => {
      const ta = prev[team.id] || [];
      const filtered = ta.filter((a) => !(a.agentId === agentId && dates.includes(a.date)));
      const added = dates.map((d) => ({ agentId, date: d, type, dateFrom, dateTo }));
      return { ...prev, [team.id]: [...filtered, ...added] };
    });
    setAbsModal(null);
  }
  function deleteAbsence(agentId, date) {
    if (!team) return;
    setAbsences((prev) => ({ ...prev, [team.id]: (prev[team.id] || []).filter((a) => !(a.agentId === agentId && a.date === date)) }));
    setAbsModal(null);
  }
  function requestLeave(req) {setLeaveRequests((prev) => [...prev, req]);}
  function reviewLeave(id, status, managerNote) {
    setLeaveRequests((prev) => {
      const req = prev.find((r) => r.id === id);
      if (!req) return prev;
      const agentId = req.agentId || req.userId;
      // Build affected dates
      const dates = [];let cur = parseD(req.dateFrom);const end = parseD(req.dateTo);
      while (cur <= end) {dates.push(fmt(cur));cur.setDate(cur.getDate() + 1);}
      // Side-effects on absences
      if (status === 'approved') {
        setAbsences((ab) => {
          const ta = ab[req.teamId] || [];
          const filtered = ta.filter((a) => !(a.agentId === agentId && dates.includes(a.date)));
          const added = dates.map((d) => ({ agentId, date: d, type: req.type, dateFrom: req.dateFrom, dateTo: req.dateTo, leaveId: id }));
          return { ...ab, [req.teamId]: [...filtered, ...added] };
        });
      } else if (req.status === 'approved' && (status === 'cancelled' || status === 'refused' || status === 'pending')) {
        // Remove absences linked to this leave
        setAbsences((ab) => ({ ...ab, [req.teamId]: (ab[req.teamId] || []).filter((a) => a.leaveId !== id) }));
      }
      return prev.map((r) => r.id === id ? { ...r, status, managerNote } : r);
    });
  }
  function applyImport({ agents, tournees }) {updateTeam((t) => ({ ...t, agents, tournees }));setImportModal(false);}
  function exportCSV() {
    if (!team) return;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const rows = [['Agent', ...Array.from({ length: daysInMonth }, (_, i) => `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`)].join(',')];
    (team.agents || []).forEach((a) => {
      const cells = [a.name];
      for (let d = 1; d <= daysInMonth; d++) {const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;cells.push(absMap[`${a.id}__${ds}`]?.type || 'P');}
      rows.push(cells.join(','));
    });
    const b = new Blob([rows.join('\n')], { type: 'text/csv' });const u = URL.createObjectURL(b);
    const a = document.createElement('a');a.href = u;a.download = `planning_${team.name}_${year}_${month + 1}.csv`;a.click();
  }

  function handleLogin() {
    const email = loginEmail.trim().toLowerCase();
    const name = loginName.trim();
    if (!name || !email) {setLoginError('Veuillez saisir votre nom et votre email.');return;}
    if (!email.includes('@')) {setLoginError('Veuillez saisir une adresse email valide.');return;}
    const profile = { id: email, name, email };
    setUser(profile);
    setAuthUser(profile);
    setLoginError('');
  }

  function handleLogout() {
    setAuthUser(null);
  }

  if (!authUser) {
    return (
      <div id="root" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(180deg, #F0F4FF 0%, #FFFFFF 100%)', padding: 20 }}>
        <div style={{ width: '100%', maxWidth: 420, borderRadius: 24, padding: 32, boxShadow: '0 28px 80px rgba(0,0,0,0.12)', background: 'rgba(255,255,255,0.96)', border: '1px solid rgba(29,29,31,0.06)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
            <img src="assets/laposte.png" alt="La Poste" style={{ width: 42, height: 42, borderRadius: 12, objectFit: 'cover' }} />
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--text)' }}>Tournéa</div>
              <div style={{ fontSize: 13, color: 'var(--text-2)' }}>Connexion agent</div>
            </div>
          </div>
          <div style={{ marginBottom: 20, color: 'var(--text-2)', lineHeight: 1.6 }}>Connectez-vous pour accéder à votre planning et aux tournées. La première connexion sera mémorisée automatiquement pour la prochaine fois.</div>
          <div style={{ display: 'grid', gap: 14 }}>
            <label className="field-label">Nom</label>
            <input className="input" type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)} placeholder="Marie Dupont" />
            <label className="field-label">Email</label>
            <input className="input" type="email" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} placeholder="marie.dupont@laposte.fr" />
            {loginError && <div style={{ color: '#D92B2B', fontSize: 13 }}>{loginError}</div>}
            <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={handleLogin}>Se connecter</button>
            <button className="btn btn-ghost" style={{ width: '100%', justifyContent: 'center' }} onClick={() => {setLoginName(''); setLoginEmail(''); setLoginError('');}}>Effacer</button>
          </div>
          <div style={{ marginTop: 24, fontSize: 12, color: 'var(--text-3)' }}>Besoin d’un compte agent ? Demandez à votre responsable de créer votre profil dans l’application.</div>
        </div>
      </div>
    );
  }

  if (!team) return null;

  return (
    <div id="root">
      <div className="topbar">
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginRight: 14 }}>
          <img src="assets/laposte.png" alt="La Poste" style={{ height: 32, width: 'auto', display: 'block', background: 'transparent' }}/>
          <div style={{ width: 1, height: 28, background: 'var(--border)' }}/>
          <img src="assets/logissimo.png" alt="Log'issimo" style={{ height: 28, width: 'auto', display: 'block', background: 'transparent' }}/>
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 1,
          fontFamily: "'Bebas Neue', 'Inter', sans-serif", fontSize: 32, lineHeight: 1, letterSpacing: '0.5px', fontWeight: 400 }}>
          <span style={{ color: '#FFD100' }}>T</span>
          <span style={{ color: '#FFD100' }}>O</span>
          <span style={{ color: '#FFD100' }}>U</span>
          <span style={{ color: '#FFD100' }}>R</span>
          <span style={{ color: '#FFD100' }}>N</span>
          <span style={{ color: '#FFD100' }}>É</span>
          <span style={{ color: '#1D3D8C' }}>A</span>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: team.color || '#FFD100', flexShrink: 0,
            boxShadow: `0 0 0 3px ${team.color || '#FFD100'}22` }}/>
          <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.15 }}>
            <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)' }}>{team.name}</span>
            <span style={{ fontSize: 10.5, color: 'var(--text-2)', letterSpacing: '.2px' }}>
              <span style={{ fontVariantNumeric: 'tabular-nums', color: 'var(--text)', fontWeight: 500 }}>{team.agents?.length || 0}</span> agents
              <span style={{ margin: '0 5px', color: 'var(--text-3)' }}>·</span>
              <span style={{ fontVariantNumeric: 'tabular-nums', color: 'var(--text)', fontWeight: 500 }}>{team.tournees?.length || 0}</span> tournées
            </span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {tab === 'planning' && <>
            <button className="btn btn-ghost btn-icon" onClick={() => window.print()} title="Imprimer"><Icon name="printer" size={16} /></button>
          </>}
          <button className="btn btn-tinted" onClick={() => setImportModal(true)}><Icon name="upload" size={14} /> Import</button>
          <button className="btn btn-ghost" onClick={handleLogout}>Déconnexion</button>
        </div>
      </div>

      <div className="shell">
        <Sidebar user={user} teams={teams} curTeamId={team.id} setCurTeamId={setCurTeamId}
        tab={tab} setTab={setTab} pendingCount={pendingCount}
        onCreateTeam={() => setCreateTeamModal(true)} />

        <div className="main">
          {tab === 'planning' &&
          <PlanningView team={team}
          year={year} month={month} setYear={setYear} setMonth={setMonth}
          selDay={selDay} setSelDay={setSelDay}
          absMap={absMap} assignments={assignments} setAssignments={setAssignments}
          onCellClick={(agent, ds) => setAbsModal({ agent, date: ds, existing: absMap[`${agent.id}__${ds}`] })}
          holidays={holidays} updateTeam={updateTeam} />
          }
          {tab === 'optimisation' && <OptimisationView team={team} selDay={selDay} setSelDay={setSelDay} absMap={absMap} assignments={assignments} setAssignments={setAssignments} />}
          {tab === 'leaves' && <LeavesView team={team} user={user} leaveRequests={leaveRequests} onRequestLeave={requestLeave} onReviewLeave={reviewLeave} />}
          {tab === 'agents' && <AgentsView team={team} updateTeam={updateTeam} absMap={absMap} selDay={selDay} />}
          {tab === 'tournees' && <TourneesView team={team} updateTeam={updateTeam} />}
          {tab === 'dashboard' && <DashboardView team={team} absMap={absMap} leaveRequests={leaveRequests} year={year} month={month} assignments={assignments} setYear={setYear} setMonth={setMonth} selDay={selDay} setSelDay={setSelDay} />}
          {tab === 'settings' && <SettingsView user={user} team={team} updateTeam={updateTeam}
          onImport={() => setImportModal(true)} onCreateTeam={() => setCreateTeamModal(true)} onJoinTeam={() => setShowJoinModal(true)}
          theme={theme} setTheme={setTheme} accentColor={accentColor} setAccentColor={setAccentColor}
          liquidGlass={liquidGlass} setLiquidGlass={setLiquidGlass}
          setUser={setUser} onDeleteTeam={deleteTeam} canDeleteTeam={teams.length > 1} onLogout={handleLogout} />}
        </div>
      </div>

      {/* Mobile tab bar */}
      <div className="tabbar">
        {[
        { k: 'planning', icon: 'calendar', label: 'Planning' },
        { k: 'leaves', icon: 'leaf', label: 'Congés' },
        { k: 'dashboard', icon: 'chart', label: 'Stats' },
        { k: 'settings', icon: 'settings', label: 'Réglages' }].
        map((n) =>
        <div key={n.k} className={`tabbar-item${tab === n.k ? ' active' : ''}`} onClick={() => setTab(n.k)}>
            <Icon name={n.icon} size={22} />
            <span>{n.label}</span>
          </div>
        )}
      </div>

      {absModal && <AbsenceModal {...absModal} onSave={saveAbsence} onDelete={deleteAbsence} onClose={() => setAbsModal(null)} />}
      {createTeamModal && <CreateTeamModal onSave={createTeam} onClose={() => setCreateTeamModal(false)} />}
      {importModal && team && <ImportModal onApply={applyImport} onClose={() => setImportModal(false)} />}
      {showJoinModal && <JoinTeamModal onJoin={joinTeam} onClose={() => setShowJoinModal(false)} />}

      <LPTweaks/>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
