<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>La Poste — Gestion RH</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ══ DARK THEME (default) ══════════════════════════════════════════════════ */
:root{
  --bg:#07071a;
  --bg2:#0c0c22;
  --surface:rgba(255,255,255,0.05);
  --surface-hover:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.16);
  --text:#f0f0ff;
  --text2:#8888aa;
  --text3:#44445a;
  --yellow:#FFD100;
  --neon:#38bdf8;
  --purple:#a78bfa;
  --blur:blur(40px) saturate(180%);
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --r:16px;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.08);
}

/* ══ LIGHT THEME ══════════════════════════════════════════════════════════ */
html[data-theme="light"]{
  --bg:#eef2ff;
  --bg2:#e4eaff;
  --surface:rgba(255,255,255,0.85);
  --surface-hover:rgba(255,255,255,1);
  --border:rgba(0,0,0,0.08);
  --border-strong:rgba(0,0,0,0.16);
  --text:#1a1a3a;
  --text2:#555577;
  --text3:#9999bb;
  --yellow:#c99a00;
  --neon:#0077bb;
  --purple:#7c3aed;
  --blur:blur(24px) saturate(140%);
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --card-bg:rgba(255,255,255,0.75);
  --card-border:rgba(0,0,0,0.08);
}

/* ══ LIQUID GLASS THEME ═══════════════════════════════════════════════════ */
html[data-theme="glass"]{
  --bg:#000818;
  --bg2:rgba(255,255,255,0.03);
  --surface:rgba(255,255,255,0.10);
  --surface-hover:rgba(255,255,255,0.16);
  --border:rgba(255,255,255,0.18);
  --border-strong:rgba(255,255,255,0.30);
  --text:#ffffff;
  --text2:#aaaacc;
  --text3:#555577;
  --yellow:#FFD100;
  --neon:#00ffcc;
  --purple:#c084fc;
  --blur:blur(60px) saturate(220%);
  --shadow:0 8px 40px rgba(0,0,0,0.6),inset 0 1px rgba(255,255,255,0.25);
  --card-bg:rgba(255,255,255,0.08);
  --card-border:rgba(255,255,255,0.20);
}

html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background .35s,color .25s;}
#root{height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* Ambient blobs */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 15% 15%,rgba(255,180,0,.1) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 80%,rgba(56,189,248,.1) 0%,transparent 55%),
    radial-gradient(ellipse 50% 45% at 50% 50%,rgba(167,139,250,.05) 0%,transparent 60%);
  transition:opacity .35s;
}
html[data-theme="light"] body::before{
  background:
    radial-gradient(ellipse 70% 55% at 15% 10%,rgba(255,200,0,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 80%,rgba(0,120,220,.06) 0%,transparent 55%);
}
html[data-theme="glass"] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,rgba(120,0,255,.2) 0%,transparent 55%),
    radial-gradient(ellipse 70% 60% at 90% 80%,rgba(0,200,255,.18) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%,rgba(0,255,160,.06) 0%,transparent 60%);
}
html[data-theme="glass"] body{
  background:linear-gradient(135deg,#0a0020 0%,#000a1a 50%,#000d10 100%);
}

/* ── Glass card mixin ── */
.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--r);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow);
  transition:background .25s,border-color .25s;
}
html[data-theme="glass"] .card{
  box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1);
}
.card:hover{border-color:var(--border-strong);}
.card-hdr{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--surface-hover);border-radius:var(--r) var(--r) 0 0;
}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;}

/* ── Sidebar ── */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--card-bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:background .25s;
}
html[data-theme="glass"] .sidebar{
  background:rgba(255,255,255,0.07);
  box-shadow:inset -1px 0 rgba(255,255,255,0.08);
}
html[data-theme="light"] .sidebar{background:rgba(255,255,255,0.7);}
.sb-logo{padding:18px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-badge{width:34px;height:34px;border-radius:10px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-weight:700;font-size:12px;color:#000;flex-shrink:0;}
.sb-section{padding:10px 8px 4px;}
.sb-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:0 6px;margin-bottom:5px;}
.sb-team{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:10px;cursor:pointer;transition:.18s;font-size:12px;font-weight:500;}
.sb-team:hover{background:var(--surface-hover);}
.sb-team.active{background:rgba(255,209,0,0.12);border:1px solid rgba(255,209,0,0.22);}
html[data-theme="light"] .sb-team.active{background:rgba(201,154,0,0.10);border-color:rgba(201,154,0,0.28);}
.sb-action{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:10px;cursor:pointer;font-size:11px;color:var(--text2);transition:.18s;}
.sb-action:hover{color:var(--yellow);background:rgba(255,209,0,0.06);}
.sb-nav{padding:6px 8px;}
.sb-nav-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.18s;}
.sb-nav-item:hover{background:var(--surface-hover);color:var(--text);}
.sb-nav-item.active{background:var(--surface-hover);color:var(--text);}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer;transition:.18s;}
.sb-user:hover{background:var(--surface-hover);}

/* ── Topbar ── */
.topbar{
  padding:10px 18px;background:var(--card-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;
  transition:background .25s;
}
html[data-theme="glass"] .topbar{background:rgba(255,255,255,0.06);}
html[data-theme="light"] .topbar{background:rgba(255,255,255,0.8);}

/* ── Buttons ── */
.btn{padding:7px 15px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s;white-space:nowrap;}
.by{background:var(--yellow);color:#000;}
.by:hover{filter:brightness(1.1);transform:translateY(-1px);}
.bg{background:var(--surface);border:1px solid var(--border);color:var(--text);}
.bg:hover{background:var(--surface-hover);}
.bn{background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.28);color:var(--neon);}
.bn:hover{background:rgba(56,189,248,0.22);}
.bd{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171;}
.bd:hover{background:rgba(239,68,68,0.22);}
.btn-sm{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Inter';font-size:11px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;}
.btn-sm:hover{background:var(--surface-hover);color:var(--text);}
.mn-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s;}
.mn-btn:hover{background:var(--surface-hover);}

/* ── Form fields ── */
.fl{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;}
.fi{width:100%;background:rgba(0,0,0,0.25);border:1px solid var(--border);color:var(--text);font-family:'Inter';font-size:13px;padding:9px 12px;border-radius:11px;margin-bottom:12px;transition:.2s;outline:none;}
html[data-theme="light"] .fi{background:rgba(255,255,255,0.9);color:var(--text);}
.fi:focus{border-color:var(--yellow);}
textarea.fi{resize:vertical;}
input[type=date]{color-scheme:dark;}
html[data-theme="light"] input[type=date]{color-scheme:light;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
html[data-theme="light"] input[type=date]::-webkit-calendar-picker-indicator{filter:none;}

/* ── Calendar ── */
.ch{padding:5px 3px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:3;font-size:9px;font-weight:700;color:var(--text3);}
html[data-theme="light"] .ch{background:#dde4f5;}
.day-hdr{transition:.15s;}
.day-hdr.today{color:var(--yellow);}
.day-hdr.we{opacity:.4;}
.ca-name{padding:5px 9px;font-size:11px;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:5px;white-space:nowrap;position:sticky;left:0;background:var(--bg2);z-index:2;}
html[data-theme="light"] .ca-name{background:#dde4f5;border-color:rgba(0,0,0,0.05);}
.ca-cell{border-bottom:1px solid rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .1s;position:relative;min-height:28px;display:flex;align-items:center;justify-content:center;}
html[data-theme="light"] .ca-cell{border-color:rgba(0,0,0,0.05);}
.ca-cell:hover{background:var(--surface-hover);}
.ca-cell.sel{background:rgba(56,189,248,0.1);outline:1px inset rgba(56,189,248,0.35);}
.ca-cell.tod{background:rgba(255,209,0,0.05);}
.ca-cell.we{background:rgba(255,255,255,0.01);}
html[data-theme="light"] .ca-cell.we{background:rgba(0,0,0,0.02);}
.abs-chip{width:calc(100% - 3px);height:calc(100% - 3px);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;letter-spacing:.3px;}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:14px;padding:8px 18px;background:var(--card-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid var(--border);flex-shrink:0;align-items:center;transition:background .25s;}
html[data-theme="glass"] .stats-bar{background:rgba(255,255,255,0.05);}

/* ── Modals ── */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;animation:fin .15s ease;}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border-strong);border-radius:22px;padding:24px;min-width:340px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px rgba(255,255,255,.1);animation:sup .2s ease;}
html[data-theme="light"] .modal{background:#f0f4ff;}
html[data-theme="glass"] .modal{background:rgba(5,5,30,0.85);backdrop-filter:blur(60px);}
@keyframes sup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* ── Absence grid ── */
.abs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.abs-btn{padding:8px 6px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);cursor:pointer;font-family:'Inter';font-size:11px;font-weight:600;color:var(--text2);transition:.18s;text-align:center;}
html[data-theme="light"] .abs-btn{border-color:rgba(0,0,0,0.09);background:rgba(255,255,255,.5);}
.abs-btn:hover,.abs-btn.sel{border-color:var(--c,#fff);color:var(--c,#fff);background:color-mix(in srgb,var(--c,#fff) 12%,transparent);}

/* ── Role buttons (auth) ── */
.role-row{display:flex;gap:8px;margin-bottom:12px;}
.role-btn{flex:1;padding:10px;border-radius:11px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Inter';font-size:13px;font-weight:500;color:var(--text2);transition:.18s;text-align:center;}
.role-btn.active{border-color:var(--yellow);background:rgba(255,209,0,0.1);color:var(--yellow);}

/* ── Auth screen ── */
.auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;}
.auth-card{background:var(--card-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border-strong);border-radius:24px;padding:32px;width:min(420px,92vw);box-shadow:0 24px 80px rgba(0,0,0,.65),inset 0 1px rgba(255,255,255,.12);}
html[data-theme="glass"] .auth-card{background:rgba(255,255,255,0.10);box-shadow:0 24px 80px rgba(0,0,0,.8),inset 0 1px rgba(255,255,255,.2);}
html[data-theme="light"] .auth-card{background:rgba(255,255,255,.88);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.auth-badge{width:42px;height:42px;border-radius:13px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-weight:700;font-size:14px;color:#000;}
.auth-title{font-size:18px;font-weight:800;}
.auth-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.auth-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:18px;gap:4px;}
.auth-tab{flex:1;padding:7px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:.18s;text-align:center;}
.auth-tab.active{background:var(--yellow);color:#000;}
.auth-err{color:#f87171;font-size:12px;margin-bottom:10px;padding:7px 10px;background:rgba(239,68,68,.1);border-radius:8px;border:1px solid rgba(239,68,68,.2);}
.auth-submit{width:100%;padding:12px;border-radius:12px;border:none;background:var(--yellow);color:#000;font-family:'Inter';font-size:14px;font-weight:700;cursor:pointer;transition:.18s;margin-top:4px;}
.auth-submit:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* ── Toggle ── */
.toggle{width:30px;height:17px;border-radius:9px;cursor:pointer;background:var(--surface);border:1px solid var(--border);position:relative;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--yellow);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#000;transition:.2s;}
.toggle.on::after{left:15px;}

/* ── Drop zone ── */
.drop-zone{border:2px dashed rgba(56,189,248,0.3);border-radius:13px;padding:28px;text-align:center;cursor:pointer;transition:.2s;background:rgba(56,189,248,0.04);}
.drop-zone:hover,.drop-zone.over{border-color:var(--neon);background:rgba(56,189,248,0.09);}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}

/* ── Shell ── */
.shell{flex:1;display:flex;overflow:hidden;}

/* ── Print ── */
@media print{.sidebar,.topbar,.stats-bar,.day-panel{display:none!important;}.cal-panel{padding:0!important;}}
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;
const uS=useState,uE=useEffect,uM=useMemo,uR=useRef,uC=useCallback;

// ─── La Poste RH v3 · Core: constants, utils, auth, modals ───────────────────

// ── Constants ─────────────────────────────────────────────────────────────────
const ABSENCE_TYPES=[
  {code:'CP',label:'Congés Payés',color:'#22c55e'},
  {code:'MAL',label:'Maladie',color:'#ef4444'},
  {code:'FORM',label:'Formation',color:'#3b82f6'},
  {code:'RC',label:'Repos Comp.',color:'#f97316'},
  {code:'AT',label:'Acc. Travail',color:'#a855f7'},
  {code:'CSE',label:'CSE/RPX',color:'#06b6d4'},
  {code:'CARC',label:'CA/RC',color:'#ec4899'},
  {code:'ATM',label:'ATM/ATA',color:'#64748b'},
  {code:'ASA',label:'ASA',color:'#fbbf24'},
  {code:'AUTRE',label:'Autre',color:'#6b7280'},
];
const LEAVE_TYPES=[
  {code:'CP',label:'Congés Payés',color:'#22c55e'},
  {code:'RTT',label:'RTT',color:'#3b82f6'},
  {code:'CSS',label:'Congé sans solde',color:'#94a3b8'},
  {code:'MAT',label:'Maternité',color:'#ec4899'},
  {code:'PAT',label:'Paternité',color:'#8b5cf6'},
  {code:'MAL',label:'Maladie',color:'#ef4444'},
  {code:'FP',label:'Famille perso',color:'#f59e0b'},
];
const ABS_MAP=Object.fromEntries(ABSENCE_TYPES.map(a=>[a.code,a]));
const LEAVE_MAP=Object.fromEntries(LEAVE_TYPES.map(a=>[a.code,a]));
const FR_MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FR_DOW=['L','M','M','J','V','S','D'];
const TEAM_COLORS=['#FFD100','#38bdf8','#a78bfa','#34d399','#f87171','#fb923c','#e879f9','#2dd4bf'];
const AGENT_COLORS=['#FFD100','#38bdf8','#a78bfa','#34d399','#f87171','#fb923c','#e879f9','#2dd4bf','#fbbf24','#60a5fa','#f472b6','#4ade80','#c084fc','#818cf8','#fdba74'];
const CAT_COLORS=['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4','#f97316'];
const T_COLORS=['#1e3a5f','#1a3a2a','#3a1a3a','#3a2a1a','#1a2a3a','#2a1a2a','#1a3a3a','#2d2a1a'];
const THEMES=[{id:'dark',label:'Sombre',icon:'🌙'},{id:'light',label:'Clair',icon:'☀️'},{id:'glass',label:'Liquid Glass',icon:'💎'}];

// ── Utils ─────────────────────────────────────────────────────────────────────
function mkId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function generateCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v!==null?v:def;}catch{return def;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
function hashPw(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h.toString(36);}

function getEaster(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=(h+l-7*m+114)%31+1;
  return new Date(y,month-1,day);
}
function getFrHolidays(year){
  const e=getEaster(year);
  const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return fmt(x);};
  return new Set([
    `${year}-01-01`,add(e,1),`${year}-05-01`,`${year}-05-08`,
    add(e,39),add(e,50),`${year}-07-14`,`${year}-08-15`,
    `${year}-11-01`,`${year}-11-11`,`${year}-12-25`,
  ]);
}

function autoAssign(team,absMap,dateStr){
  const present=(team.agents||[]).filter(a=>!absMap[`${a.userId||a.id}__${dateStr}`]);
  if(!present.length)return{};
  const res={};let idx=0;
  (team.tournees||[]).forEach(t=>{
    const elig=present.filter(a=>{if(a.prefEnabled&&a.preferred?.length>0)return a.preferred.includes(t.id);return true;});
    const pool=elig.length?elig:present;
    res[t.id]=pool[idx%pool.length].userId||pool[idx%pool.length].id;
    idx++;
  });
  return res;
}

// ── AuthScreen ────────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const[mode,setMode]=useState('login');
  const[name,setName]=useState('');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[role,setRole]=useState('agent');
  const[err,setErr]=useState('');

  function doLogin(){
    const users=load('lp3_users',[]);
    const u=users.find(x=>x.email===email&&x.password===hashPw(pw));
    if(!u){setErr('Email ou mot de passe incorrect.');return;}
    onLogin(u);
  }
  function doRegister(){
    if(!name.trim()||!email.trim()||!pw.trim()){setErr('Tous les champs sont requis.');return;}
    const users=load('lp3_users',[]);
    if(users.find(u=>u.email===email)){setErr('Cet email est déjà utilisé.');return;}
    const u={id:mkId(),name:name.trim(),email:email.trim(),password:hashPw(pw),role,color:AGENT_COLORS[users.length%AGENT_COLORS.length]};
    const next=[...users,u];save('lp3_users',next);
    onLogin(u);
  }

  return(
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-badge">LP</div>
          <div>
            <div className="auth-title">La Poste RH</div>
            <div className="auth-sub">Gestion des tournées & équipes</div>
          </div>
        </div>
        <div className="auth-tabs">
          {[['login','Connexion'],['register','Créer un compte']].map(([k,l])=>(
            <div key={k} className={`auth-tab${mode===k?' active':''}`} onClick={()=>{setMode(k);setErr('');}}>{l}</div>
          ))}
        </div>
        {mode==='register'&&(
          <div>
            <div className="fl">Nom complet</div>
            <input className="fi" placeholder="Marie Dupont" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
        )}
        <div className="fl">Adresse e-mail</div>
        <input className="fi" type="email" placeholder="exemple@laposte.fr" value={email} onChange={e=>setEmail(e.target.value)}/>
        <div className="fl">Mot de passe</div>
        <input className="fi" type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(mode==='login'?doLogin():doRegister())}/>
        {mode==='register'&&(
          <div>
            <div className="fl">Rôle</div>
            <div className="role-row">
              {[['manager','👔 Manager'],['agent','📬 Agent']].map(([k,l])=>(
                <div key={k} className={`role-btn${role===k?' active':''}`} onClick={()=>setRole(k)}>{l}</div>
              ))}
            </div>
          </div>
        )}
        {err&&<div className="auth-err">{err}</div>}
        <button className="auth-submit" onClick={mode==='login'?doLogin:doRegister}>
          {mode==='login'?'Se connecter':'Créer le compte'}
        </button>
        <div style={{textAlign:'center',marginTop:14}}>
          <span style={{fontSize:11,color:'var(--text3)',cursor:'pointer',textDecoration:'underline'}}
            onClick={()=>{if(confirm('Effacer toutes les données locales et repartir de zéro ?')){localStorage.clear();window.location.reload();}}}>
            Réinitialiser toutes les données

        </div>
      </div>
    </div>
  );
}

function AbsenceModal({agent,date,existing,onSave,onDelete,onClose}){
  const[type,setType]=useState(existing?.type||'CP');
  const[from,setFrom]=useState(existing?.dateFrom||date);
  const[to,setTo]=useState(existing?.dateTo||date);
  const save=()=>{
    const a=from<=to?from:to,b=from<=to?to:from;
    const dates=[];let cur=parseD(a);const end=parseD(b);
    while(cur<=end){dates.push(fmt(cur));cur.setDate(cur.getDate()+1);}

// ── ImportModal ───────────────────────────────────────────────────────────────
function ImportModal({team,onApply,onClose}){
  const[dragging,setDragging]=useState(false);
  const[parsed,setParsed]=useState(null);
  const[err,setErr]=useState('');
  const fileRef=useRef();
  function parseXlsx(ab){
    try{
      const wb=XLSX.read(ab,{type:'array'});
      const name=wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:''});
      const agents=[...new Set(rows.slice(1).map(r=>String(r[0]||'').trim()).filter(v=>v&&v.length>2&&v.length<40&&!/^\d/.test(v)))].slice(0,80);
      const tournees=[...new Set(rows[0]?.slice(1).map(c=>String(c||'').trim()).filter(v=>v&&v.length>0&&v.length<30)||[])].slice(0,100);
      setParsed({agents,tournees,sheet:name});
      setErr('');
    }catch(e){setErr('Erreur: '+e.message);}
  }
  function handleFile(f){const r=new FileReader();r.onload=e=>parseXlsx(e.target.result);r.readAsArrayBuffer(f);}
  function apply(){
    const agents=(parsed?.agents||[]).map((name,i)=>({id:mkId(),userId:mkId(),name,color:AGENT_COLORS[i%AGENT_COLORS.length],prefEnabled:false,preferred:[]}));
    const tournees=(parsed?.tournees||[]).map((name,i)=>({id:mkId(),name,color:T_COLORS[i%T_COLORS.length],num:i+1,categoryId:null}));
    onApply({agents,tournees});
  }
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{minWidth:460}}>
        <div className="modal-title">Import Excel</div>
        <div className="modal-sub">Glissez votre fichier — agents (col A) et tournées (ligne 1) détectés automatiquement</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}}
          onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
        <div className={`drop-zone${dragging?' over':''}`}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);}}
          onClick={()=>fileRef.current.click()}>
          <div style={{fontSize:32,marginBottom:6}}>📊</div>
          <div style={{fontWeight:600}}>Glissez votre Excel ici</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>ou cliquez · .xlsx .xls .csv</div>
        </div>
        {err&&<div style={{color:'#f87171',fontSize:12,marginTop:8}}>⚠ {err}</div>}
        {parsed&&!err&&(
          <div style={{display:'flex',gap:12,marginTop:12}}>
            <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'var(--surface)',border:'1px solid var(--border)'}}>
              <div style={{fontSize:22,fontWeight:800,color:'var(--yellow)'}}>{parsed.agents.length}</div>
              <div style={{fontSize:11,color:'var(--text2)'}}>agents détectés</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{parsed.agents.slice(0,3).join(', ')}{parsed.agents.length>3?'…':''}</div>
            </div>
            <div style={{flex:1,padding:'10px 14px',borderRadius:10,background:'var(--surface)',border:'1px solid var(--border)'}}>
              <div style={{fontSize:22,fontWeight:800,color:'var(--neon)'}}>{parsed.tournees.length}</div>
              <div style={{fontSize:11,color:'var(--text2)'}}>tournées détectées</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{parsed.tournees.slice(0,3).join(', ')}{parsed.tournees.length>3?'…':''}</div>
            </div>
          </div>
        )}
        <div className="mf">
          <button className="btn bg" onClick={onClose}>Annuler</button>
          {parsed&&!err&&<button className="btn by" onClick={apply}>Appliquer</button>}
        </div>
      </div>
    </div>
  );
}

// ── PlanningView ──────────────────────────────────────────────────────────────
function PlanningView({team,user,isManager,year,month,setYear,setMonth,selDay,setSelDay,absMap,assignments,setAssignments,onCellClick,holidays}){
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=fmt(new Date());
  const dayKey=`${team.id}__${selDay}`;
  const dayAssign=assignments[dayKey]||{};
  const selDateObj=parseD(selDay);
  const selLabel=selDateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const visibleAgents=isManager?team.agents:(team.agents||[]).filter(a=>a.userId===user.id||a.id===user.id);
  const allPresents=(team.agents||[]).filter(a=>!absMap[`${a.userId||a.id}__${selDay}`]);
  const dayPresents=allPresents;
  const dayAbsents=(team.agents||[]).filter(a=>!!absMap[`${a.userId||a.id}__${selDay}`]);
  const coveredCount=Object.values(dayAssign).filter(Boolean).length;
  const target=team.targetPresence||Math.ceil((team.agents||[]).length*0.8);
  const presRatio=team.agents?.length?dayPresents.length/team.agents.length:1;
  const presColor=dayPresents.length>=target?'#22c55e':dayPresents.length>=target*0.7?'#f97316':'#ef4444';

  function doAutoAssign(){
    const res=autoAssign(team,absMap,selDay);
    setAssignments(prev=>({...prev,[dayKey]:res}));
  }
  function setAssign(tourneeId,agentId){
    setAssignments(prev=>({...prev,[dayKey]:{...(prev[dayKey]||{}),[tourneeId]:agentId||null}}));
  }

  const months_nav=()=>(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <button className="mn-btn" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</button>
      <span style={{fontSize:13,fontWeight:600,minWidth:120,textAlign:'center'}}>{FR_MONTHS[month]} {year}</span>
      <button className="mn-btn" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</button>
    </div>
  );

  return(
    <div style={{display:'flex',flex:1,overflow:'hidden',gap:0}}>
      {/* Calendar */}
      <div style={{flex:1,display:'flex',flexDirection:'column',padding:'12px 0 12px 12px',overflow:'hidden'}}>
        <div className="card" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div className="card-hdr">
            <span className="card-title">Planning mensuel</span>
            {months_nav()}
            <span style={{marginLeft:8,fontSize:11,color:'var(--text2)'}}>{visibleAgents.length} agents</span>
          </div>
          <div style={{flex:1,overflow:'auto'}}>
            <div style={{display:'grid',gridTemplateColumns:`150px repeat(${daysInMonth},minmax(26px,1fr))`,minWidth:'max-content'}}>
              <div className="ch" style={{textAlign:'left',paddingLeft:10}}>Agent</div>
              {Array.from({length:daysInMonth},(_,i)=>{
                const d=i+1,dow=new Date(year,month,d).getDay(),isWe=dow===0||dow===6;
                const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isHol=holidays.has(ds);
                return(
                  <div key={d} className={`ch day-hdr${ds===todayStr?' today':''}${isWe||isHol?' we':''}`}
                    style={isHol?{color:'#f97316',opacity:1}:{}}>
                    <div>{FR_DOW[(dow+6)%7]}</div>
                    <div style={{fontFamily:'Space Mono',fontSize:8,marginTop:1}}>{d}</div>
                    {isHol&&<div style={{fontSize:7,color:'#f97316'}}>🎉</div>}
                  </div>
                );
              })}
              {visibleAgents.map(agent=>{
                const aid=agent.userId||agent.id;
                return(
                  <React.Fragment key={aid}>
                    <div className="ca-name">
                      <div style={{width:7,height:7,borderRadius:'50%',background:agent.color,flexShrink:0}}/>
                      <span style={{overflow:'hidden',textOverflow:'ellipsis',fontSize:11}}>{agent.name}</span>
                    </div>
                    {Array.from({length:daysInMonth},(_,i)=>{
                      const d=i+1,dow=new Date(year,month,d).getDay(),isWe=dow===0||dow===6;
                      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                      const abs=absMap[`${aid}__${ds}`];
                      const at=abs?ABS_MAP[abs.type]:null;
                      const isHol=holidays.has(ds);
                      return(
                        <div key={d}
                          className={`ca-cell${isWe||isHol?' we':''}${ds===selDay?' sel':''}${ds===todayStr?' tod':''}`}
                          onClick={()=>{setSelDay(ds);if(!isWe&&!isHol&&isManager)onCellClick(agent,ds);else if(!isWe&&!isHol)setSelDay(ds);}}
                          title={abs?`${agent.name} — ${at?.label}`:isHol?'Jour férié':isManager?'Cliquer pour marquer absent':''}>
                          {abs&&<div className="abs-chip" style={{background:`${at?.color}22`,color:at?.color}}>{abs.type}</div>}
                          {isHol&&!abs&&<div style={{fontSize:8,color:'#f97316',opacity:.6}}>F</div>}
                        </div>
                      );
                    })}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
          <div style={{padding:'6px 12px',borderTop:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:5}}>
            {ABSENCE_TYPES.map(t=>(
              <div key={t.code} style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'var(--text2)'}}>
                <div style={{width:11,height:11,borderRadius:3,background:`${t.color}30`,border:`1px solid ${t.color}`}}/>

              </div>

          </div>
        </div>
      </div>

      {/* Day panel */}
      <div style={{width:310,flexShrink:0,padding:12,display:'flex',flexDirection:'column',gap:10,overflow:'hidden'}}>
        {/* Presence gauge */}
        <div className="card">
          <div className="card-hdr">
            <span className="card-title">{selLabel}</span>
          </div>
          <div style={{padding:'10px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:12}}>
              <span><b style={{color:presColor,fontSize:18}}>{dayPresents.length}</b> <span style={{color:'var(--text2)'}}>présents</span></span>
              <span style={{color:'var(--text2)',fontSize:11}}>Objectif : <b style={{color:'var(--text)'}}>{target}</b></span>
              <span><b style={{color:'#ef4444'}}>{dayAbsents.length}</b> <span style={{color:'var(--text2)'}}>absents</span></span>
            </div>
            <div style={{height:7,borderRadius:4,background:'var(--border)',overflow:'hidden',position:'relative'}}>
              <div style={{height:'100%',borderRadius:4,background:presColor,width:`${Math.min(100,(dayPresents.length/(team.agents?.length||1))*100)}%`,transition:'width .4s'}}/>
              <div style={{position:'absolute',top:0,bottom:0,left:`${Math.min(100,(target/(team.agents?.length||1))*100)}%`,width:2,background:'rgba(255,255,255,0.6)',borderRadius:1}}/>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:8}}>
              {(team.agents||[]).map(a=>{
                const isAbs=!!absMap[`${a.userId||a.id}__${selDay}`];
                return(
                  <span key={a.userId||a.id} style={{padding:'2px 6px',borderRadius:5,fontSize:10,fontWeight:500,
                    background:isAbs?'rgba(255,255,255,0.04)':`${a.color}18`,
                    border:`1px solid ${isAbs?'rgba(255,255,255,0.06)':`${a.color}40`}`,
                    color:isAbs?'var(--text3)':a.color,
                    textDecoration:isAbs?'line-through':'none',opacity:isAbs?.45:1}}>
                    {a.name.split(' ').pop()}
                  </span>
                );
              })}
            </div>
          </div>
        </div>

        {/* Tournées */}
        <div className="card" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div className="card-hdr">
            <span className="card-title">Tournées</span>
            <span style={{fontSize:10,color:'var(--text2)',marginLeft:4}}>{coveredCount}/{team.tournees?.length||0}</span>
            {isManager&&<button className="btn-sm bn" style={{marginLeft:'auto'}} onClick={doAutoAssign}>⚡ Auto</button>}
          </div>
          {/* Category filter */}
          {team.categories?.length>0&&(
            <div style={{padding:'6px 8px',borderBottom:'1px solid var(--border)',display:'flex',gap:4,flexWrap:'wrap'}}>
              {team.categories.map(c=>(
                <span key={c.id} style={{padding:'2px 7px',borderRadius:5,fontSize:10,fontWeight:600,background:`${c.color}22`,color:c.color,border:`1px solid ${c.color}55`}}>{c.name}</span>
              ))}
            </div>
          )}
          <div style={{flex:1,overflow:'auto',padding:'6px 8px',display:'flex',flexDirection:'column',gap:3}}>
            {(team.tournees||[]).map(t=>{
              const cat=team.categories?.find(c=>c.id===t.categoryId);
              const aId=dayAssign[t.id];
              const ag=(team.agents||[]).find(a=>(a.userId||a.id)===aId);
              return(
                <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 8px',borderRadius:9,
                  background:'var(--surface)',border:'1px solid var(--border)',transition:'.15s'}}>
                  <div style={{width:26,height:20,borderRadius:4,background:t.color||'#1e3a5f',display:'flex',alignItems:'center',justifyContent:'center',
                    fontFamily:'Space Mono',fontSize:9,fontWeight:700,color:'var(--text)',border:'1px solid rgba(255,255,255,0.1)',flexShrink:0}}>
                    {String(t.num||'').toString().padStart(2,'0')||'—'}
                  </div>
                  {cat&&<div style={{width:4,height:18,borderRadius:2,background:cat.color,flexShrink:0}}/>}
                  <span style={{flex:1,fontSize:11,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
                  {isManager?(
                    <select style={{background:'rgba(0,0,0,0.3)',border:'1px solid '+(ag?`${ag.color}55`:'var(--border)'),color:ag?ag.color:'var(--text2)',
                      fontFamily:'inherit',fontSize:10,padding:'2px 4px',borderRadius:5,cursor:'pointer',maxWidth:88}}
                      value={aId||''} onChange={e=>setAssign(t.id,e.target.value||null)}>

                    ag?<span style={{fontSize:10,color:ag.color,fontWeight:500}}>{ag.name.split(' ').pop()}</span>

              );

              :<div style={{padding:'5px 10px',borderRadius:8,background:'rgba(251,146,60,0.12)',border:'1px solid rgba(251,146,60,0.25)',color:'#fb923c',fontSize:11,fontWeight:600}}>⚠ {(team.tournees?.length||0)-coveredCount} non assignées</div>}

// ── LeaveView ─────────────────────────────────────────────────────────────────
function LeaveView({user,team,isManager,leaveRequests,onRequestLeave,onReviewLeave,absMap}){
  const[reviewReq,setReviewReq]=uS(null);
  const[showNewReq,setShowNewReq]=uS(false);
  const[filter,setFilter]=uS('pending');

  const teamReqs=leaveRequests.filter(r=>r.teamId===team.id);
  const myReqs=teamReqs.filter(r=>r.userId===user.id);
  const visibleReqs=isManager?teamReqs.filter(r=>filter==='all'||r.status===filter):myReqs;

  function statusStyle(s){
    if(s==='approved')return{bg:'rgba(34,197,94,.12)',border:'rgba(34,197,94,.25)',color:'#4ade80'};
    if(s==='refused')return{bg:'rgba(239,68,68,.12)',border:'rgba(239,68,68,.25)',color:'#f87171'};
    return{bg:'rgba(251,191,36,.12)',border:'rgba(251,191,36,.25)',color:'#fbbf24'};
  }
  function statusLabel(s){return s==='approved'?'✓ Approuvé':s==='refused'?'✕ Refusé':'⏳ En attente';}

  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <div className="card-hdr" style={{borderRadius:0,borderTop:'none',borderLeft:'none',borderRight:'none',padding:'12px 16px'}}>
        <span className="card-title">Congés & absences</span>
        {isManager&&(
          <div style={{display:'flex',gap:4,marginLeft:12}}>
            {['pending','approved','refused','all'].map(s=>(
              <button key={s} className="btn-sm" style={{background:filter===s?'var(--yellow)':'var(--surface)',color:filter===s?'#000':'var(--text2)',border:'1px solid var(--border)',borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:11}}
                onClick={()=>setFilter(s)}>
                {s==='pending'?`⏳ Attente (${teamReqs.filter(r=>r.status==='pending').length})`:s==='approved'?'✓ Approuvés':s==='refused'?'✕ Refusés':'Tous'}
              </button>
            ))}
          </div>
        )}
        {!isManager&&<button className="btn by" style={{marginLeft:'auto',fontSize:12,padding:'6px 14px'}} onClick={()=>setShowNewReq(true)}>+ Demande de congé</button>}
      </div>
      <div style={{flex:1,overflow:'auto',padding:16}}>
        {visibleReqs.length===0&&(
          <div style={{textAlign:'center',padding:40,color:'var(--text2)',fontSize:14}}>
            {isManager?'Aucune demande à afficher':'Aucune demande de congé'}
          </div>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:8,maxWidth:640}}>
          {visibleReqs.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(req=>{
            const agent=(team.agents||[]).find(a=>a.userId===req.userId||a.id===req.userId);
            const lt=LEAVE_MAP[req.type]||{label:req.type,color:'#999'};
            const ss=statusStyle(req.status);
            const days=Math.round((parseD(req.dateTo)-parseD(req.dateFrom))/86400000)+1;
            return(
              <div key={req.id} className="card"
                style={{padding:'14px 16px',cursor:isManager&&req.status==='pending'?'pointer':'default',transition:'.2s'}}
                onClick={()=>isManager&&req.status==='pending'&&setReviewReq(req)}>
                <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
                  <div style={{width:36,height:36,borderRadius:10,background:agent?.color||'#999',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12,color:'#000',flexShrink:0}}>
                    {(agent?.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontWeight:600,fontSize:13}}>{agent?.name||'Agent'}</span>
                      <span style={{padding:'2px 7px',borderRadius:5,background:`${lt.color}22`,color:lt.color,fontSize:10,fontWeight:700}}>{lt.label}</span>
                      <span style={{padding:'2px 7px',borderRadius:5,background:ss.bg,border:`1px solid ${ss.border}`,color:ss.color,fontSize:10,fontWeight:700,marginLeft:'auto'}}>{statusLabel(req.status)}</span>
                    </div>
                    <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>
                      📅 {parseD(req.dateFrom).toLocaleDateString('fr-FR')} → {parseD(req.dateTo).toLocaleDateString('fr-FR')} · <b style={{color:'var(--yellow)'}}>{days}j</b>
                    </div>
                    {req.note&&<div style={{fontSize:11,color:'var(--text2)',marginTop:4,fontStyle:'italic'}}>"{req.note}"</div>}
                    {req.managerNote&&<div style={{fontSize:11,color:'var(--neon)',marginTop:4}}>Manager : "{req.managerNote}"</div>}
                  </div>
                  {isManager&&req.status==='pending'&&<span style={{color:'var(--text2)',fontSize:18}}>›</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {reviewReq&&isManager&&(
        <ReviewLeaveModal req={reviewReq} agents={team.agents||[]}
          onReview={(id,status,note)=>{onReviewLeave(id,status,note);setReviewReq(null);}}
          onClose={()=>setReviewReq(null)}/>
      )}
      {showNewReq&&(
        <LeaveRequestModal user={user} teamId={team.id}
          onSave={req=>{onRequestLeave(req);setShowNewReq(false);}}
          onClose={()=>setShowNewReq(false)}/>
      )}
    </div>
  );
}

    const n=team.agents.length;
    updateTeam(t=>({...t,agents:[...t.agents,{id:mkId(),userId:mkId(),name:`Agent ${n+1}`,color:AGENT_COLORS[n%AGENT_COLORS.length],prefEnabled:false,preferred:[]}]}));
  }
  function removeAgent(id){updateTeam(t=>({...t,agents:t.agents.filter(a=>(a.userId||a.id)!==id)}));}
  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <div className="card-hdr" style={{borderRadius:0,borderTop:'none',borderLeft:'none',borderRight:'none',padding:'12px 16px'}}>
        <span className="card-title">Agents</span>
        <span style={{fontSize:11,color:'var(--text2)',marginLeft:6}}>{team.agents?.length||0}</span>
        <button className="btn by" style={{marginLeft:'auto',fontSize:12,padding:'6px 14px'}} onClick={addAgent}>+ Ajouter</button>
      </div>
      <div style={{flex:1,overflow:'auto',padding:16}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
          {(team.agents||[]).map(agent=>{
            const aid=agent.userId||agent.id;
            return(
              <div key={aid} className="card" style={{padding:14}}>

// ── TourneesView ──────────────────────────────────────────────────────────────
function TourneesView({team,updateTeam}){
  const[catModal,setCatModal]=uS(null);// null | {cat|null}
  const[filterCat,setFilterCat]=uS(null);

  function updateTournee(id,fn){updateTeam(t=>({...t,tournees:t.tournees.map(tt=>tt.id===id?fn(tt):tt)}));}
  function addTournee(){updateTeam(t=>{const n=t.tournees.length+1;return{...t,tournees:[...t.tournees,{id:mkId(),name:`Tournée ${String(n).padStart(2,'0')}`,color:T_COLORS[n%T_COLORS.length],num:n,categoryId:null}]};});}
  function removeTournee(id){updateTeam(t=>({...t,tournees:t.tournees.filter(tt=>tt.id!==id)}));}
  function saveCategory(cat){
    updateTeam(t=>{
      const cats=t.categories||[];
      const exists=cats.find(c=>c.id===cat.id);
      return{...t,categories:exists?cats.map(c=>c.id===cat.id?cat:c):[...cats,cat]};
    });
    setCatModal(null);
  }
  function removeCat(id){updateTeam(t=>({...t,categories:(t.categories||[]).filter(c=>c.id!==id),tournees:t.tournees.map(tt=>tt.categoryId===id?{...tt,categoryId:null}:tt)}));}

  const visible=filterCat?team.tournees.filter(t=>t.categoryId===filterCat):team.tournees;

  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {/* Categories bar */}
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',background:'var(--surface-hover)'}}>
        <span style={{fontSize:11,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.6}}>Catégories</span>
        <div style={{cursor:filterCat?'pointer':'default',padding:'3px 9px',borderRadius:7,fontSize:11,fontWeight:600,background:!filterCat?'var(--yellow)':'var(--surface)',color:!filterCat?'#000':'var(--text2)',border:'1px solid var(--border)',transition:'.15s'}} onClick={()=>setFilterCat(null)}>Toutes</div>
        {(team.categories||[]).map(c=>(
          <div key={c.id} style={{display:'flex',alignItems:'center',gap:0,borderRadius:7,overflow:'hidden',border:`1px solid ${c.color}55`}}>
            <div style={{cursor:'pointer',padding:'3px 9px',fontSize:11,fontWeight:600,background:filterCat===c.id?`${c.color}33`:'var(--surface)',color:c.color,transition:'.15s'}}
              onClick={()=>setFilterCat(filterCat===c.id?null:c.id)}>{c.name}</div>
            <div style={{padding:'3px 6px',cursor:'pointer',color:'var(--text3)',fontSize:13,borderLeft:`1px solid ${c.color}33`}} onClick={()=>setCatModal({cat:c})}>✎</div>
            <div style={{padding:'3px 6px',cursor:'pointer',color:'var(--text3)',fontSize:13,borderLeft:`1px solid ${c.color}33`}} onClick={()=>removeCat(c.id)}>×</div>
          </div>
        ))}
        <button className="btn-sm bn" onClick={()=>setCatModal({cat:null})}>+ Catégorie</button>
        <button className="btn by" style={{marginLeft:'auto',fontSize:12,padding:'6px 14px'}} onClick={addTournee}>+ Tournée</button>
      </div>
      <div style={{flex:1,overflow:'auto',padding:16}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8}}>
          {visible.map(t=>{
            const cat=(team.categories||[]).find(c=>c.id===t.categoryId);
            return(
              <div key={t.id} className="card" style={{padding:'10px 12px',display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:8,background:t.color||'#1e3a5f',display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:'Space Mono',fontSize:10,fontWeight:700,color:'var(--text)',border:'1px solid rgba(255,255,255,0.1)',flexShrink:0}}>
                  {String(t.num||'').toString().padStart(2,'0')||'—'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <input style={{background:'transparent',border:'none',color:'var(--text)',fontFamily:'inherit',fontSize:12,fontWeight:500,width:'100%',borderBottom:'1px solid transparent',transition:'.2s',padding:0}}
                    value={t.name} onChange={e=>updateTournee(t.id,tt=>({...tt,name:e.target.value}))}
                    onFocus={e=>e.target.style.borderBottomColor='var(--neon)'}
                    onBlur={e=>e.target.style.borderBottomColor='transparent'}/>
                  <div>
                    <select style={{background:'transparent',border:'none',color:cat?cat.color:'var(--text3)',fontSize:10,fontFamily:'inherit',cursor:'pointer',padding:0,marginTop:2}}
                      value={t.categoryId||''} onChange={e=>updateTournee(t.id,tt=>({...tt,categoryId:e.target.value||null}))}>
                      <option value="">Sans catégorie</option>
                      {(team.categories||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}

                  </div>

                <button onClick={()=>removeTournee(t.id)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:18,lineHeight:1,flexShrink:0}}>×</button>
              </div>
            );

      </div>
      {catModal&&<CategoryModal category={catModal.cat} onSave={saveCategory} onClose={()=>setCatModal(null)}/>}
    </div>
  );
}

// ── DashboardView ─────────────────────────────────────────────────────────────
function DashboardView({team,absMap,leaveRequests,year,month,assignments}){
  const daysInMonth=new Date(year,month+1,0).getDate();
  const agents=team.agents||[];

  // Absence counts per type this month
  const absByType={};
  ABSENCE_TYPES.forEach(t=>{absByType[t.code]=0;});
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    agents.forEach(a=>{const abs=absMap[`${a.userId||a.id}__${ds}`];if(abs)absByType[abs.type]=(absByType[abs.type]||0)+1;});
  }

  // Per-agent absence count
  const agentAbsCount=agents.map(a=>{
    let n=0;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(absMap[`${a.userId||a.id}__${ds}`])n++;
    }
    return{agent:a,count:n};
  }).sort((a,b)=>b.count-a.count);

  // Coverage rate
  let totalCovered=0,totalPossible=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(year,month,d).getDay();
    if(dow===0||dow===6)continue;
    totalPossible++;
    const da=assignments[`${team.id}__${ds}`]||{};
    if(Object.values(da).some(Boolean))totalCovered++;
  }

  const pendingLeaves=leaveRequests.filter(r=>r.teamId===team.id&&r.status==='pending').length;
  const totalAbsences=Object.values(absByType).reduce((a,b)=>a+b,0);
  const workDays=Array.from({length:daysInMonth},(_,i)=>{const d=new Date(year,month,i+1);return d.getDay()!==0&&d.getDay()!==6;}).filter(Boolean).length;
  const presenceRate=agents.length&&workDays?Math.round(100-(totalAbsences/(agents.length*workDays)*100)):100;

  return(
    <div style={{flex:1,overflow:'auto',padding:16}}>
      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'Taux présence',value:`${presenceRate}%`,sub:`${FR_MONTHS[month]}`,color:'#22c55e',icon:'📈'},
          {label:'Absences',value:totalAbsences,sub:'ce mois',color:'#f97316',icon:'📋'},
          {label:'Congés en attente',value:pendingLeaves,sub:'à valider',color:'#fbbf24',icon:'⏳'},
          {label:'Couverture tournées',value:`${totalPossible?Math.round(totalCovered/totalPossible*100):0}%`,sub:'jours planifiés',color:'#38bdf8',icon:'🗺'},
        ].map(k=>(
          <div key={k.label} className="card" style={{padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:20}}>{k.icon}</span>
              <span style={{fontSize:11,color:'var(--text2)',fontWeight:600}}>{k.label}</span>
            </div>
            <div style={{fontSize:28,fontWeight:800,color:k.color}}>{k.value}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {/* Absences by type */}
        <div className="card" style={{padding:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Absences par type</div>
          {ABSENCE_TYPES.filter(t=>absByType[t.code]>0).sort((a,b)=>absByType[b.code]-absByType[a.code]).map(t=>{
            const n=absByType[t.code];
            const max=Math.max(...Object.values(absByType))||1;
            return(
              <div key={t.code} style={{marginBottom:7}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                  <span style={{color:t.color,fontWeight:600}}>{t.label}</span>
                  <span style={{color:'var(--text2)'}}>{n}j</span>
                </div>
                <div style={{height:5,borderRadius:3,background:'var(--border)'}}>
                  <div style={{height:'100%',borderRadius:3,background:t.color,width:`${(n/max)*100}%`,transition:'width .4s'}}/>
                </div>
              </div>
            );
          })}
          {totalAbsences===0&&<div style={{color:'var(--text3)',fontSize:12}}>Aucune absence ce mois</div>}
        </div>

        {/* Top absents */}
        <div className="card" style={{padding:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Absences par agent</div>
          {agentAbsCount.filter(x=>x.count>0).slice(0,8).map(({agent,count})=>(
            <div key={agent.userId||agent.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <div style={{width:26,height:26,borderRadius:7,background:agent.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:10,color:'#000',flexShrink:0}}>
                {agent.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
              </div>
              <span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{agent.name}</span>
              <div style={{height:5,flex:2,borderRadius:3,background:'var(--border)'}}>
                <div style={{height:'100%',borderRadius:3,background:agent.color,width:`${Math.min(100,count/workDays*100)}%`,transition:'width .4s'}}/>
              </div>
              <span style={{fontSize:11,color:'var(--text2)',fontFamily:'Space Mono',minWidth:28,textAlign:'right'}}>{count}j</span>
            </div>
          ))}
          {agentAbsCount.every(x=>x.count===0)&&<div style={{color:'var(--text3)',fontSize:12}}>Tous les agents ont été présents</div>}
        </div>
      </div>
    </div>
  );
}

            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:12,fontSize:12}}>
              {[['Agents',team.agents?.length||0],['Tournées',team.tournees?.length||0],['Objectif',team.targetPresence||'—'],['Catégories',team.categories?.length||0]].map(([k,v])=>(
                <div key={k} style={{padding:'8px 12px',borderRadius:10,background:'var(--surface)',border:'1px solid var(--border)'}}>
                  <div style={{color:'var(--text2)',fontSize:10,marginBottom:2}}>{k}</div>
                  <div style={{fontWeight:700,fontSize:18}}>{v}</div>
                </div>
              ))}
            </div>
            {isManager&&(
              <>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:'var(--text2)',marginBottom:6}}>Code d'invitation à partager avec vos agents</div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{fontFamily:'Space Mono',fontSize:20,fontWeight:700,color:'var(--yellow)',letterSpacing:5,padding:'8px 16px',background:'var(--surface)',borderRadius:10,border:'1px solid var(--border)'}}>{team.code}</div>
                    <button className="btn bg" style={{fontSize:11}} onClick={()=>navigator.clipboard?.writeText(team.code)}>📋 Copier</button>
                  </div>
                </div>
                <button className="btn bg" onClick={()=>setTeamSettings(true)}>⚙ Modifier les paramètres de l'équipe</button>
              </>
            )}
            {!isManager&&(
              <button className="btn bg" onClick={onJoinTeam}>🔑 Rejoindre une autre équipe</button>
            )}
          </Section>
        )}

        {/* Import/Export */}
        {isManager&&(
          <Section title="Données" icon="📊">
            <Row label="Import Excel" sub="Agents (col A) et tournées (ligne 1)">
              <button className="btn bn" onClick={onImport}>↑ Importer</button>
            </Row>
            <Row label="Réinitialiser les données" sub="Supprime absences et assignations de l'équipe">
              <button className="btn bd" onClick={()=>{if(confirm('Confirmer la réinitialisation ?'))updateTeam(t=>({...t}));}}>Réinitialiser</button>
            </Row>
          </Section>
        )}

        {/* Version */}
        <div style={{textAlign:'center',fontSize:11,color:'var(--text3)',padding:'8px 0 24px'}}>
          La Poste RH v3 · 2026 · Gestion des tournées & équipes
        </div>
      </div>

      {teamSettings&&isManager&&(
        <TeamSettingsModal team={team}
          onSave={({name,color,targetPresence})=>{updateTeam(t=>({...t,name,color,targetPresence}));setTeamSettings(false);}}
          onClose={()=>setTeamSettings(false)}/>
      )}
    </div>
  );
}

Object.assign(window,{Sidebar,PlanningView,LeaveView,AgentsView,TourneesView,DashboardView,SettingsView});




function App(){
  const[users,setUsers]=useState(()=>load('lp3_users',[]));
  const[session,setSession]=useState(()=>load('lp3_session',null));
  const[teams,setTeams]=useState(()=>load('lp3_teams',[]));
  const[absences,setAbsences]=useState(()=>load('lp3_abs',{}));
  const[assignments,setAssignments]=useState(()=>load('lp3_assign',{}));
  const[leaveRequests,setLeaveRequests]=useState(()=>load('lp3_leaves',[]));
  const[theme,setTheme]=useState(()=>localStorage.getItem('lp3_theme')||'dark');
  const[curTeamId,setCurTeamId]=useState(()=>load('lp3_curTeam',null));
  const[tab,setTab]=useState('planning');
  const[year,setYear]=useState(()=>new Date().getFullYear());
  const[month,setMonth]=useState(()=>new Date().getMonth());
  const[selDay,setSelDay]=useState(()=>fmt(new Date()));
  const[absModal,setAbsModal]=useState(null);
  const[createTeamModal,setCreateTeamModal]=useState(false);
  const[joinTeamModal,setJoinTeamModal]=useState(false);
  const[importModal,setImportModal]=useState(false);

  // Apply theme to html element
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('lp3_theme',theme);},[theme]);
  useEffect(()=>{save('lp3_users',users);},[users]);
  useEffect(()=>{save('lp3_teams',teams);},[teams]);
  useEffect(()=>{save('lp3_abs',absences);},[absences]);
  useEffect(()=>{save('lp3_assign',assignments);},[assignments]);
  useEffect(()=>{save('lp3_leaves',leaveRequests);},[leaveRequests]);
  useEffect(()=>{if(curTeamId)save('lp3_curTeam',curTeamId);},[curTeamId]);

  const currentUser=session?users.find(u=>u.id===session.userId):null;
  const myTeams=currentUser?teams.filter(t=>t.managerIds?.includes(currentUser.id)||t.agentIds?.includes(currentUser.id)):[];
  const team=useMemo(()=>teams.find(t=>t.id===curTeamId)||myTeams[0],[teams,curTeamId,myTeams]);
  const isManager=!!(team&&currentUser&&team.managerIds?.includes(currentUser.id));

  useEffect(()=>{if(!curTeamId&&myTeams.length)setCurTeamId(myTeams[0].id);},[curTeamId,myTeams]);

  // Auto-create default team if none
  useEffect(()=>{
    if(currentUser && teams.length===0){
      const agents=Array.from({length:8},(_,i)=>({id:mkId(),userId:mkId(),name:`Agent ${i+1}`,color:AGENT_COLORS[i%AGENT_COLORS.length],prefEnabled:false,preferred:[]}));
      const tournees=Array.from({length:20},(_,i)=>({id:mkId(),name:`Tournée ${String(i+1).padStart(2,'0')}`,color:T_COLORS[i%T_COLORS.length],num:i+1,categoryId:null}));
      const categories=[{id:mkId(),name:'Remises',color:CAT_COLORS[0]},{id:mkId(),name:'Collectes',color:CAT_COLORS[1]}];
      const t={id:mkId(),name:'Mon Équipe',color:'#FFD100',code:generateCode(),managerIds:[currentUser.id],agentIds:[],targetPresence:6,agents,tournees,categories};
      setTeams([t]);
      setCurTeamId(t.id);
    }
  },[currentUser,teams.length]);

  const holidays=useMemo(()=>getFrHolidays(year),[year]);
  const absMap=useMemo(()=>{
    const m={};
    (absences[team?.id]||[]).forEach(a=>{m[`${a.agentId}__${a.date}`]=a;});
    return m;
  },[absences,team]);

  const pendingCount=useMemo(()=>leaveRequests.filter(r=>r.teamId===team?.id&&r.status==='pending').length,[leaveRequests,team]);

  function login(u){setSession({userId:u.id});save('lp3_session',{userId:u.id});}
  function logout(){setSession(null);save('lp3_session',null);}

  function updateTeamById(id,fn){setTeams(prev=>prev.map(t=>t.id===id?fn(t):t));}
  function updateTeam(fn){if(team)updateTeamById(team.id,fn);}

  function createTeam(t){
    const newTeam={...t,managerIds:[currentUser.id],agentIds:[]};
    setTeams(prev=>[...prev,newTeam]);
    setCurTeamId(newTeam.id);
    setCreateTeamModal(false);
  }

  function joinTeam(teamId){
    const t=teams.find(x=>x.id===teamId);
    if(!t||!currentUser)return;
    // Add user to team agentIds and create agent entry
    const agentEntry={id:mkId(),userId:currentUser.id,name:currentUser.name,color:currentUser.color||AGENT_COLORS[0],prefEnabled:false,preferred:[]};
    updateTeamById(teamId,tm=>({...tm,agentIds:[...(tm.agentIds||[]),currentUser.id],agents:[...(tm.agents||[]),agentEntry]}));
    setCurTeamId(teamId);
    setJoinTeamModal(false);
  }

  function saveAbsence(agentId,dates,type,dateFrom,dateTo){
    if(!team)return;
    setAbsences(prev=>{
      const ta=prev[team.id]||[];
      const filtered=ta.filter(a=>!(a.agentId===agentId&&dates.includes(a.date)));
      const added=dates.map(d=>({agentId,date:d,type,dateFrom,dateTo}));
      return{...prev,[team.id]:[...filtered,...added]};
    });
    setAbsModal(null);
  }
  function deleteAbsence(agentId,date){
    if(!team)return;
    setAbsences(prev=>({...prev,[team.id]:(prev[team.id]||[]).filter(a=>!(a.agentId===agentId&&a.date===date))}));
    setAbsModal(null);
  }

  function requestLeave(req){
    setLeaveRequests(prev=>[...prev,req]);
  }
  function reviewLeave(id,status,managerNote){
    setLeaveRequests(prev=>prev.map(r=>{
      if(r.id!==id)return r;
      const updated={...r,status,managerNote};
      // If approved → create absences
      if(status==='approved'){
        const dates=[];let cur=parseD(r.dateFrom);const end=parseD(r.dateTo);
        while(cur<=end){dates.push(fmt(cur));cur.setDate(cur.getDate()+1);}
        setAbsences(ab=>{
          const ta=ab[r.teamId]||[];
          const filtered=ta.filter(a=>!(a.agentId===r.userId&&dates.includes(a.date)));
          const added=dates.map(d=>({agentId:r.userId,date:d,type:r.type,dateFrom:r.dateFrom,dateTo:r.dateTo}));
          return{...ab,[r.teamId]:[...filtered,...added]};
        });
      }
      return updated;
    }));
  }

  function applyImport({agents,tournees}){updateTeam(t=>({...t,agents,tournees}));setImportModal(false);}
  function exportCSV(){
    if(!team)return;
    const daysInMonth=new Date(year,month+1,0).getDate();
    const rows=[['Agent',...Array.from({length:daysInMonth},(_,i)=>`${year}-${String(month+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`)].join(',')];
    (team.agents||[]).forEach(a=>{
      const aid=a.userId||a.id;
      const cells=[a.name];
      for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells.push(absMap[`${aid}__${ds}`]?.type||'P');}
      rows.push(cells.join(','));
    });
    const b=new Blob([rows.join('\n')],{type:'text/csv'});const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`planning_${team.name}_${year}_${month+1}.csv`;a.click();
  }

  const dayKey=`${team?.id}__${selDay}`;
  const dayPresents=useMemo(()=>(team?.agents||[]).filter(a=>!absMap[`${a.userId||a.id}__${selDay}`]),[team,absMap,selDay]);
  const dayAbsents=useMemo(()=>(team?.agents||[]).filter(a=>!!absMap[`${a.userId||a.id}__${selDay}`]),[team,absMap,selDay]);
  const coveredCount=useMemo(()=>Object.values(assignments[dayKey]||{}).filter(Boolean).length,[assignments,dayKey]);

  // Auto-create default user + session if none
  useEffect(()=>{
    if(!load('lp3_session',null)){
      const u={id:mkId(),name:'Manager',email:'manager@laposte.fr',password:'',role:'manager',color:'#FFD100'};
      save('lp3_users',[u]);
      save('lp3_session',{userId:u.id});
      setUsers([u]);
      setSession({userId:u.id});
    }
  },[]);

  // No auth → show auth screen
  if(!currentUser) return null;

  // Logged in, no team
  const noTeam=!team;

  return(
    <div id="root" style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Topbar */}
      <div className="topbar">
        <div style={{lineHeight:1.3}}>
          <div style={{fontSize:15,fontWeight:700}}>{team?.name||'La Poste RH'}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{team?`${team.agents?.length||0} agents · ${team.tournees?.length||0} tournées`:'Aucune équipe sélectionnée'}</div>
        </div>
        <div style={{display:'flex',gap:6,marginLeft:'auto',alignItems:'center'}}>
          {tab==='planning'&&team&&(
            <>
              <button className="btn bg" style={{fontSize:11,padding:'5px 12px'}} onClick={exportCSV}>↓ CSV</button>
              <button className="btn bg" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>window.print()}>⎙</button>
            </>
          )}
          {isManager&&<button className="btn bn" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>setImportModal(true)}>↑ Excel</button>}
        </div>
      </div>

      <div className="shell">
        {/* Sidebar */}
        <Sidebar
          user={currentUser} teams={teams} curTeamId={team?.id} setCurTeamId={setCurTeamId}
          tab={tab} setTab={setTab} isManager={isManager} pendingCount={pendingCount}
          onCreateTeam={()=>setCreateTeamModal(true)} onJoinTeam={()=>setJoinTeamModal(true)}
          onLogout={logout}
        />

        {/* Content */}
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {noTeam&&(
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,color:'var(--text2)'}}>
              <div style={{fontSize:48}}>📬</div>
              <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>Bienvenue, {currentUser.name} !</div>
              <div style={{fontSize:14}}>Créez ou rejoignez une équipe pour commencer.</div>
              <div style={{display:'flex',gap:10}}>
                {isManager!==false&&<button className="btn by" onClick={()=>setCreateTeamModal(true)}>+ Créer une équipe</button>}
                <button className="btn bg" onClick={()=>setJoinTeamModal(true)}>🔑 Rejoindre avec un code</button>
              </div>
            </div>
          )}
          {!noTeam&&tab==='planning'&&(
            <PlanningView
              team={team} user={currentUser} isManager={isManager}
              year={year} month={month} setYear={setYear} setMonth={setMonth}
              selDay={selDay} setSelDay={setSelDay}
              absMap={absMap} assignments={assignments} setAssignments={setAssignments}
              onCellClick={(agent,ds)=>setAbsModal({agent,date:ds,existing:absMap[`${agent.userId||agent.id}__${ds}`]})}
              holidays={holidays}
            />
          )}
          {!noTeam&&tab==='leaves'&&(
            <LeaveView user={currentUser} team={team} isManager={isManager}
              leaveRequests={leaveRequests} onRequestLeave={requestLeave}
              onReviewLeave={reviewLeave} absMap={absMap}/>
          )}
          {!noTeam&&tab==='agents'&&isManager&&<AgentsView team={team} updateTeam={updateTeam}/>}
          {!noTeam&&tab==='tournees'&&isManager&&<TourneesView team={team} updateTeam={updateTeam}/>}
          {!noTeam&&tab==='dashboard'&&isManager&&(
            <DashboardView team={team} absMap={absMap} leaveRequests={leaveRequests}
              year={year} month={month} assignments={assignments}/>
          )}
          {tab==='settings'&&(
            <SettingsView user={currentUser} team={team} isManager={isManager}
              updateTeam={updateTeam} onImport={()=>setImportModal(true)}
              teams={teams} onJoinTeam={()=>setJoinTeamModal(true)}
              theme={theme} setTheme={setTheme}
              users={users} setUsers={setUsers}/>
          )}
        </div>
      </div>

      {/* Stats bar */}
      {!noTeam&&(
        <div className="stats-bar">
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#22c55e'}}/>
            <b style={{color:'#4ade80'}}>{dayPresents.length}</b>
            <span style={{color:'var(--text2)'}}>présents</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#ef4444'}}/>
            <b style={{color:'#f87171'}}>{dayAbsents.length}</b>
            <span style={{color:'var(--text2)'}}>absents</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'var(--neon)'}}/>
            <b>{coveredCount}/{team.tournees?.length||0}</b>
            <span style={{color:'var(--text2)'}}>couverts</span>
          </div>
          {pendingCount>0&&isManager&&(
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,cursor:'pointer'}} onClick={()=>setTab('leaves')}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#fbbf24'}}/>
              <b style={{color:'#fbbf24'}}>{pendingCount}</b>
              <span style={{color:'var(--text2)'}}>congé{pendingCount>1?'s':''} en attente</span>
            </div>
          )}
          <div style={{marginLeft:'auto',fontSize:10,color:'var(--text3)',fontFamily:'Space Mono'}}>
            {parseD(selDay).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
          </div>
        </div>
      )}

      {/* Modals */}
      {absModal&&isManager&&<AbsenceModal {...absModal} onSave={saveAbsence} onDelete={deleteAbsence} onClose={()=>setAbsModal(null)}/>}
      {createTeamModal&&<CreateTeamModal onSave={createTeam} onClose={()=>setCreateTeamModal(false)}/>}
      {joinTeamModal&&<JoinTeamModal user={currentUser} teams={teams} onJoin={joinTeam} onClose={()=>setJoinTeamModal(false)}/>}
      {importModal&&team&&<ImportModal team={team} onApply={applyImport} onClose={()=>setImportModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
